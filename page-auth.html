<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加入 Cine Ours</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0C0B09;--bg1:#111009;--bg2:#161410;
  --ink:#EDE6D9;--ink2:#B5AC9E;--ink3:#7A7268;--ink4:#4A4540;
  --gold:#C8A44A;--green:#5C9E6A;--red:#9B4040;
  --b:rgba(237,230,217,.07);--b2:rgba(237,230,217,.13);--b3:rgba(237,230,217,.24);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-size:15px}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;min-height:100vh}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:'DM Sans',sans-serif;background:none;border:none;outline:none;color:var(--ink)}
.wrap{width:100%;max-width:400px;padding:40px 24px}
.logo{font-family:'Playfair Display',serif;font-size:22px;text-align:center;margin-bottom:32px}
.logo em{font-style:italic;color:var(--gold)}
.mode-tabs{display:flex;border:1px solid var(--b2);margin-bottom:24px}
.mtab{flex:1;padding:10px;text-align:center;font-size:12px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--ink3);cursor:pointer;border-right:1px solid var(--b2)}
.mtab:last-child{border-right:none}
.mtab.on{background:var(--bg2);color:var(--ink)}
.method-tabs{display:flex;gap:6px;margin-bottom:18px}
.method-tab{font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  padding:6px 14px;border:1px solid var(--b);color:var(--ink3);cursor:pointer}
.method-tab.on{border-color:var(--gold);color:var(--gold)}
.fsec{display:none}.fsec.on{display:block}
.sub-form{display:none}.sub-form.on{display:block}
.field{margin-bottom:13px}
.flabel{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.finput{width:100%;padding:12px 14px;border:1px solid var(--b2);font-size:14px;
  color:var(--ink);background:var(--bg1);transition:border-color .2s}
.finput:focus{border-color:var(--b3)}
.finput::placeholder{color:var(--ink4)}
.fwrap{position:relative}
.send-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);
  cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;white-space:nowrap}
.send-btn:disabled{color:var(--ink3);cursor:default}
.sbtn{width:100%;padding:13px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;
  background:var(--gold);color:var(--bg);cursor:pointer;margin-top:6px;
  font-family:'DM Sans',sans-serif;border:1px solid var(--gold);transition:background .2s}
.sbtn:hover{background:#D4AE55}
.sbtn:disabled{background:var(--bg2);border-color:var(--b2);color:var(--ink4);cursor:default}
.sw{text-align:center;font-size:13px;color:var(--ink3);margin-top:16px}
.sw a{color:var(--gold);cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);
  padding:10px 22px;font-size:13px;border:1px solid var(--b2);background:var(--bg2);
  color:var(--ink2);opacity:0;transition:all .25s;white-space:nowrap;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--red);color:#C87878}
.toast.ok{border-color:var(--green);color:#7EC98E}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Cine <em>Ours</em></div>

  <div class="mode-tabs">
    <div class="mtab on" id="tab-reg"   onclick="switchMode('reg')">注册</div>
    <div class="mtab"    id="tab-login" onclick="switchMode('login')">登录</div>
  </div>

  <!-- 注册 -->
  <div class="fsec on" id="fsec-reg">
    <div class="method-tabs">
      <div class="method-tab on" id="mt-reg-email" onclick="switchMethod('reg','email')">邮箱</div>
      <div class="method-tab"    id="mt-reg-phone" onclick="switchMethod('reg','phone')">手机号</div>
    </div>
    <div class="sub-form on" id="reg-email">
      <div class="field"><div class="flabel">昵称</div><input class="finput" id="r-name" placeholder="你的电影人名字"></div>
      <div class="field"><div class="flabel">邮箱</div><input class="finput" id="r-email" type="email" placeholder="your@email.com"></div>
      <div class="field"><div class="flabel">密码（至少8位）</div><input class="finput" id="r-pw" type="password" placeholder="设置密码"></div>
      <button class="sbtn" id="r-email-btn" onclick="doRegEmail()">创建账号</button>
    </div>
    <div class="sub-form" id="reg-phone">
      <div class="field"><div class="flabel">手机号</div>
        <div class="fwrap"><input class="finput" id="r-phone" type="tel" placeholder="+86 13800000000" style="padding-right:96px">
        <button class="send-btn" id="r-send-btn" onclick="doSendReg()">发送验证码</button></div>
      </div>
      <div class="field" id="r-code-wrap" style="display:none"><div class="flabel">验证码</div><input class="finput" id="r-code" type="text" placeholder="6位验证码" maxlength="6"></div>
      <button class="sbtn" id="r-phone-btn" onclick="doVerifyReg()" style="display:none">验证并注册</button>
    </div>
    <div class="sw">已有账号？<a onclick="switchMode('login')">登录</a></div>
  </div>

  <!-- 登录 -->
  <div class="fsec" id="fsec-login">
    <div class="method-tabs">
      <div class="method-tab on" id="mt-login-email" onclick="switchMethod('login','email')">邮箱</div>
      <div class="method-tab"    id="mt-login-phone" onclick="switchMethod('login','phone')">手机号</div>
    </div>
    <div class="sub-form on" id="login-email">
      <div class="field"><div class="flabel">邮箱</div><input class="finput" id="l-email" type="email" placeholder="your@email.com"></div>
      <div class="field"><div class="flabel">密码</div><input class="finput" id="l-pw" type="password" placeholder="输入密码" onkeydown="if(event.key==='Enter')doLoginEmail()"></div>
      <button class="sbtn" id="l-email-btn" onclick="doLoginEmail()">登录</button>
    </div>
    <div class="sub-form" id="login-phone">
      <div class="field"><div class="flabel">手机号</div>
        <div class="fwrap"><input class="finput" id="l-phone" type="tel" placeholder="+86 13800000000" style="padding-right:96px">
        <button class="send-btn" id="l-send-btn" onclick="doSendLogin()">发送验证码</button></div>
      </div>
      <div class="field" id="l-code-wrap" style="display:none"><div class="flabel">验证码</div><input class="finput" id="l-code" type="text" placeholder="6位验证码" maxlength="6"></div>
      <button class="sbtn" id="l-phone-btn" onclick="doVerifyLogin()" style="display:none">验证登录</button>
    </div>
    <div class="sw">没有账号？<a onclick="switchMode('reg')">注册</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Init ─────────────────────────────────────────────
const _sb = supabase.createClient(
  'https://dirrnojiybbwotuqeqww.supabase.co',
  'sb_publishable_Rbie_WEsyNAV38b-QKrbCw_bBwuxicP'
);

// ── Toast ─────────────────────────────────────────────
let _tt;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(_tt);
  _tt = setTimeout(() => { t.className = 'toast'; }, 3000);
}

// ── Switch ────────────────────────────────────────────
function switchMode(mode) {
  ['reg','login'].forEach(m => {
    document.getElementById('tab-' + m).classList.toggle('on', m === mode);
    document.getElementById('fsec-' + m).classList.toggle('on', m === mode);
  });
}

function switchMethod(mode, method) {
  ['email','phone'].forEach(m => {
    document.getElementById('mt-' + mode + '-' + m).classList.toggle('on', m === method);
    const prefix = mode === 'reg' ? 'reg' : 'login';
    document.getElementById(prefix + '-' + m).classList.toggle('on', m === method);
  });
}

// ── On success ────────────────────────────────────────
function onAuthSuccess(name) {
  showToast('欢迎，' + (name || '影迷') + '！', 'ok');
  setTimeout(() => {
    try { window.parent.postMessage({ type: 'login' }, '*'); } catch(e) {}
    try { if (window.parent.navigate) window.parent.navigate('home'); } catch(e) {}
  }, 1200);
}

// ── 邮箱注册 ──────────────────────────────────────────
async function doRegEmail() {
  const name  = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pw    = document.getElementById('r-pw').value;
  if (!name)  return showToast('请填写昵称', 'err');
  if (!email) return showToast('请填写邮箱', 'err');
  if (pw.length < 8) return showToast('密码至少8位', 'err');
  const btn = document.getElementById('r-email-btn');
  btn.textContent = '注册中…'; btn.disabled = true;
  try {
    const { error } = await _sb.auth.signUp({
      email, password: pw,
      options: { data: { username: name, display_name: name } }
    });
    if (error) throw error;
    onAuthSuccess(name);
  } catch(e) {
    let msg = e.message || '注册失败';
    if (msg.includes('already')) msg = '该邮箱已注册，请直接登录';
    showToast(msg, 'err');
    btn.textContent = '创建账号'; btn.disabled = false;
  }
}

// ── 邮箱登录 ──────────────────────────────────────────
async function doLoginEmail() {
  const email = document.getElementById('l-email').value.trim();
  const pw    = document.getElementById('l-pw').value;
  if (!email || !pw) return showToast('请填写邮箱和密码', 'err');
  const btn = document.getElementById('l-email-btn');
  btn.textContent = '登录中…'; btn.disabled = true;
  try {
    const { data, error } = await _sb.auth.signInWithPassword({ email, password: pw });
    if (error) throw error;
    onAuthSuccess(data.user?.user_metadata?.display_name);
  } catch(e) {
    showToast('邮箱或密码不正确', 'err');
    btn.textContent = '登录'; btn.disabled = false;
  }
}

// ── 手机号注册发码 ────────────────────────────────────
async function doSendReg() {
  let phone = document.getElementById('r-phone').value.trim().replace(/\s/g,'');
  if (!phone) return showToast('请输入手机号', 'err');
  if (!phone.startsWith('+')) phone = '+86' + phone;
  const btn = document.getElementById('r-send-btn');
  btn.disabled = true; btn.textContent = '发送中…';
  try {
    const { error } = await _sb.auth.signInWithOtp({ phone });
    if (error) throw error;
    showToast('验证码已发送', 'ok');
    document.getElementById('r-code-wrap').style.display = '';
    document.getElementById('r-phone-btn').style.display = '';
    countdown(btn);
  } catch(e) {
    showToast('发送失败：' + (e.message || ''), 'err');
    btn.disabled = false; btn.textContent = '发送验证码';
  }
}

// ── 手机号注册验证 ────────────────────────────────────
async function doVerifyReg() {
  let phone = document.getElementById('r-phone').value.trim().replace(/\s/g,'');
  const code = document.getElementById('r-code').value.trim();
  if (!phone.startsWith('+')) phone = '+86' + phone;
  if (!code) return showToast('请输入验证码', 'err');
  const btn = document.getElementById('r-phone-btn');
  btn.textContent = '验证中…'; btn.disabled = true;
  try {
    const { error } = await _sb.auth.verifyOtp({ phone, token: code, type: 'sms' });
    if (error) throw error;
    onAuthSuccess('影迷');
  } catch(e) {
    showToast('验证码不正确', 'err');
    btn.textContent = '验证并注册'; btn.disabled = false;
  }
}

// ── 手机号登录发码 ────────────────────────────────────
async function doSendLogin() {
  let phone = document.getElementById('l-phone').value.trim().replace(/\s/g,'');
  if (!phone) return showToast('请输入手机号', 'err');
  if (!phone.startsWith('+')) phone = '+86' + phone;
  const btn = document.getElementById('l-send-btn');
  btn.disabled = true; btn.textContent = '发送中…';
  try {
    const { error } = await _sb.auth.signInWithOtp({ phone });
    if (error) throw error;
    showToast('验证码已发送', 'ok');
    document.getElementById('l-code-wrap').style.display = '';
    document.getElementById('l-phone-btn').style.display = '';
    countdown(btn);
  } catch(e) {
    showToast('发送失败：' + (e.message || ''), 'err');
    btn.disabled = false; btn.textContent = '发送验证码';
  }
}

// ── 手机号登录验证 ────────────────────────────────────
async function doVerifyLogin() {
  let phone = document.getElementById('l-phone').value.trim().replace(/\s/g,'');
  const code = document.getElementById('l-code').value.trim();
  if (!phone.startsWith('+')) phone = '+86' + phone;
  if (!code) return showToast('请输入验证码', 'err');
  const btn = document.getElementById('l-phone-btn');
  btn.textContent = '验证中…'; btn.disabled = true;
  try {
    const { error } = await _sb.auth.verifyOtp({ phone, token: code, type: 'sms' });
    if (error) throw error;
    onAuthSuccess('影迷');
  } catch(e) {
    showToast('验证码不正确', 'err');
    btn.textContent = '验证登录'; btn.disabled = false;
  }
}

// ── 倒计时 ────────────────────────────────────────────
function countdown(btn) {
  let s = 60;
  const t = setInterval(() => {
    btn.textContent = s + 's后重发'; s--;
    if (s < 0) { clearInterval(t); btn.disabled = false; btn.textContent = '重新发送'; }
  }, 1000);
}
</script>
</body>
</html>

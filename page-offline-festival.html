<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>线下影展</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0C0B09;--bg1:#111009;--bg2:#161410;--bg3:#1C1A15;--bg4:#252018;--ink:#EDE6D9;--ink2:#B5AC9E;--ink3:#7A7268;--ink4:#4A4540;--gold:#C8A44A;--gold2:#9B7A2E;--gold3:#3D2E0E;--green:#5C9E6A;--b:rgba(237,230,217,.07);--b2:rgba(237,230,217,.13);--b3:rgba(237,230,217,.22);--tr:all .22s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}html{font-size:15px}
body{background:var(--bg);color:var(--ink);font-family:"DM Sans",sans-serif;overflow-y:auto;min-height:100vh}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg4)}
button{font-family:"DM Sans",sans-serif;cursor:pointer;border:none;background:none;color:inherit}
.hero{padding:52px 48px 40px;border-bottom:1px solid var(--b);position:relative;overflow:hidden;background:linear-gradient(135deg,#0a1818 0%,#101f20 50%,#080e14 100%)}
.hero-ey{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:10px;margin-bottom:16px}
.hero-ey::before{content:"";width:20px;height:1px;background:var(--gold)}
.hero-title{font-family:"Playfair Display",serif;font-size:clamp(30px,5vw,52px);font-weight:400;line-height:1.05;margin-bottom:10px}
.hero-title em{font-style:italic;color:var(--gold)}
.hero-sub{font-size:13px;color:var(--ink2);max-width:480px;line-height:1.75;margin-bottom:28px}
.tabs-bar{display:flex;border-bottom:1px solid var(--b);position:sticky;top:0;z-index:100;background:rgba(12,11,9,.96);backdrop-filter:blur(12px)}
.tab{font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:14px 22px;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:var(--tr)}
.tab:hover{color:var(--ink)}.tab.on{color:var(--ink);border-bottom-color:var(--gold)}
.tab-panel{display:none}.tab-panel.on{display:block}
.sec-hd{display:flex;align-items:baseline;justify-content:space-between;padding:24px 48px 18px}
.sec-title{font-family:"Playfair Display",serif;font-size:20px;font-weight:400}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--b)}
.feat-img{min-height:220px;position:relative;overflow:hidden;display:flex;align-items:flex-end}
.feat-img-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.45)}
.feat-img-ov{position:absolute;inset:0;background:linear-gradient(to right,transparent 50%,var(--bg) 95%),linear-gradient(to top,rgba(12,11,9,.8) 0%,transparent 40%)}
.feat-img-cnt{position:absolute;bottom:0;left:0;right:0;padding:20px 24px}
.feat-body{padding:24px 28px;border-left:1px solid var(--b)}
.feat-ey{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.feat-ey::before{content:"";width:14px;height:1px;background:var(--gold)}
.feat-title{font-family:"Playfair Display",serif;font-size:clamp(20px,3vw,32px);font-weight:400;line-height:1.1;margin-bottom:8px}
.feat-title em{font-style:italic;color:var(--gold)}
.feat-meta{font-size:12px;color:var(--ink3);margin-bottom:12px;display:flex;gap:14px;flex-wrap:wrap}
.feat-desc{font-size:13px;color:var(--ink2);line-height:1.75;margin-bottom:16px}
.feat-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.ftag{font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:2px 9px;border:1px solid var(--b2);color:var(--ink3)}
.ftag.g{border-color:var(--gold3);color:var(--gold)}
.off-btn{font-size:11px;letter-spacing:.09em;text-transform:uppercase;padding:9px 20px;border:1px solid var(--b2);color:var(--ink2);transition:var(--tr)}
.off-btn:hover{border-color:var(--gold);color:var(--gold)}
.fest-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--b)}
.fc{background:var(--bg);cursor:pointer;transition:background .2s;overflow:hidden}
.fc:hover{background:var(--bg1)}
.fc-img{height:90px;position:relative;overflow:hidden;display:flex;align-items:flex-end}
.fc-img-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.45);transition:transform .4s}
.fc:hover .fc-img-bg{transform:scale(1.05)}
.fc-img-ov{position:absolute;inset:0;background:linear-gradient(transparent 30%,rgba(12,11,9,.85))}
.fc-title{position:relative;z-index:1;font-family:"Playfair Display",serif;font-size:14px;font-weight:400;padding:0 12px 8px;line-height:1.2}
.fc-title em{font-style:italic;color:var(--gold)}
.fc-body{padding:10px 12px 14px}
.fc-status{font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:4px}
.s-active{color:var(--green)}.s-soon{color:var(--gold)}.s-past{color:var(--ink4)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:lp 2s ease-in-out infinite}
@keyframes lp{0%,100%{box-shadow:0 0 3px var(--green)}50%{box-shadow:0 0 9px var(--green)}}
.fc-meta{font-size:11px;color:var(--ink3);margin-bottom:6px;display:flex;gap:8px;flex-wrap:wrap}
.fc-desc{font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:8px}
.fc-awards{display:flex;gap:4px;flex-wrap:wrap}
.fc-aw{font-size:10px;padding:2px 8px;border:1px solid var(--b);color:var(--ink3)}
.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:2px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-ey">线下影展 · 全球</div>
  <h1 class="hero-title">世界重要<em>电影节</em><br>一览</h1>
  <p class="hero-sub">从香港到戛纳，从北京到圣丹斯。记录你参与过的线下影展，留下观影足迹。</p>
</div>
<div class="tabs-bar">
  <div class="tab on" onclick="switchTab(this,'focus')">重点影展</div>
  <div class="tab" onclick="switchTab(this,'alist')">世界A类</div>
  <div class="tab" onclick="switchTab(this,'cn')">中国三大</div>
  <div class="tab" onclick="switchTab(this,'asia')">亚洲影展</div>
</div>
<div class="tab-panel on" id="tab-focus"><div id="focus-content"><div style="padding:40px 48px"><div class="skeleton" style="height:200px;margin-bottom:1px"></div></div></div></div>
<div class="tab-panel" id="tab-alist"><div id="alist-content"><div style="padding:24px 48px"><div class="skeleton" style="height:14px;width:60%;margin-bottom:10px"></div></div></div></div>
<div class="tab-panel" id="tab-cn"><div id="cn-content"><div style="padding:24px 48px"><div class="skeleton" style="height:14px;width:60%;margin-bottom:10px"></div></div></div></div>
<div class="tab-panel" id="tab-asia"><div id="asia-content"><div style="padding:24px 48px"><div class="skeleton" style="height:14px;width:60%;margin-bottom:10px"></div></div></div></div>
<script>
const _sb=supabase.createClient("https://dirrnojiybbwotuqeqww.supabase.co","sb_publishable_Rbie_WEsyNAV38b-QKrbCw_bBwuxicP");
function nav(p){try{window.parent.postMessage({type:"navigate",payload:{page:p}},"*")}catch(e){}}
function toast(m){try{if(window.parent.showToast)window.parent.showToast(m)}catch(e){}}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
const GRADS=["linear-gradient(135deg,#0a1818,#101f20)","linear-gradient(135deg,#1a0808,#220f10)","linear-gradient(135deg,#1a1008,#221808)","linear-gradient(135deg,#080a1a,#10122a)","linear-gradient(135deg,#0a1018,#101428)","linear-gradient(135deg,#181410,#201c14)","linear-gradient(135deg,#180808,#200e10)","linear-gradient(135deg,#0a1018,#10181a)","linear-gradient(135deg,#080e18,#10161e)","linear-gradient(135deg,#081818,#0f2020)","linear-gradient(135deg,#18100a,#201808)","linear-gradient(135deg,#0a1018,#101428)"];
let allFests=[];

function switchTab(btn,id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("on"));
  btn.classList.add("on");
  document.getElementById("tab-"+id).classList.add("on");
}

function statusBadge(s){
  if(s==="active")return`<span class="fc-status s-active"><span class="live-dot"></span>正在举办</span>`;
  if(s==="upcoming")return`<span class="fc-status s-soon"><span style="width:5px;height:5px;border-radius:50%;background:var(--gold);display:inline-block;margin-right:3px"></span>即将举办</span>`;
  return`<span class="fc-status s-past">已结束</span>`;
}

function cardHTML(f,i){
  return`<div class="fc" onclick="toast('${esc(f.name)}')">
    <div class="fc-img"><div class="fc-img-bg" style="background:${GRADS[i%GRADS.length]}"></div><div class="fc-img-ov"></div><div class="fc-title">${esc(f.name)}${f.name_en?"<br><em style=\"font-size:11px;color:var(--ink3)\">"+esc(f.name_en)+"</em>":""}</div></div>
    <div class="fc-body">
      ${statusBadge(f.current_status)}
      <div class="fc-meta">${f.current_dates?esc(f.current_dates)+"&nbsp;·&nbsp;":""}${esc(f.city||f.country||"")}</div>
      <div class="fc-desc">${esc((f.description||"").slice(0,60))}${(f.description||"").length>60?"…":""}</div>
      ${f.main_award?`<div class="fc-awards"><span class="fc-aw">${esc(f.main_award)}</span></div>`:""}
    </div>
  </div>`;
}

function featuredHTML(f,i){
  if(!f)return"";
  return`<div class="feat-grid">
    <div class="feat-img"><div class="feat-img-bg" style="background:${GRADS[i%GRADS.length]}"></div><div class="feat-img-ov"></div>
      <div class="feat-img-cnt">${statusBadge(f.current_status)}<div style="font-family:'Playfair Display',serif;font-size:20px;color:var(--ink)">${esc(f.name)}</div></div>
    </div>
    <div class="feat-body">
      <div class="feat-ey">${esc(f.name_en||"")} · ${esc(f.current_edition||"")}</div>
      <h3 class="feat-title">${esc(f.name)}</h3>
      <div class="feat-meta">${f.current_dates?esc(f.current_dates):""}${f.city?"<span>"+esc(f.city)+"</span>":""}</div>
      <p class="feat-desc">${esc(f.description||"")}</p>
      ${f.main_award?`<div class="feat-tags"><span class="ftag g">${esc(f.main_award)}</span>${f.type?`<span class="ftag">${esc(f.type)}</span>`:""}</div>`:""}
      <button class="off-btn" onclick="toast('${esc(f.name)}官网')">官方网站 →</button>
    </div>
  </div>`;
}

async function load(){
  try{
    const{data,error}=await _sb.from("film_festivals_offline").select("*").order("founded_year",{ascending:true});
    if(error)throw error;
    allFests=data||[];
    render();
  }catch(e){console.error(e);renderFallback()}
}

function render(){
  if(!allFests.length){renderFallback();return}
  // Focus: find HKIFF as featured, show Beijing/Shanghai/Cannes as grid
  const hkiff=allFests.find(f=>f.name.includes("香港"))||allFests[0];
  const focusGrid=allFests.filter(f=>["北京","上海","戛纳"].some(k=>f.name.includes(k))).slice(0,3);
  document.getElementById("focus-content").innerHTML=featuredHTML(hkiff,0)+`<div class="fest-grid">${focusGrid.map((f,i)=>cardHTML(f,i+1)).join("")}</div>`;
  // A-list: type A
  const alist=allFests.filter(f=>f.type==="A类");
  document.getElementById("alist-content").innerHTML=`<div class="fest-grid" style="grid-template-columns:repeat(3,1fr)">${alist.map((f,i)=>cardHTML(f,i)).join("")}</div>`;
  // CN: Chinese
  const cn=allFests.filter(f=>f.country==="中国");
  const cnFeat=cn.find(f=>f.name.includes("上海"))||cn[0];
  const cnGrid=cn.filter(f=>f!==cnFeat);
  document.getElementById("cn-content").innerHTML=(cnFeat?featuredHTML(cnFeat,2):"")+`<div class="fest-grid">${cnGrid.map((f,i)=>cardHTML(f,i)).join("")}</div>`;
  // Asia
  const asia=allFests.filter(f=>["韩国","日本","新加坡"].includes(f.country));
  document.getElementById("asia-content").innerHTML=`<div class="fest-grid" style="grid-template-columns:repeat(3,1fr)">${asia.map((f,i)=>cardHTML(f,i)).join("")}</div>`;
}

function renderFallback(){
  const fallback=[
    {name:"香港国际电影节",name_en:"HKIFF",country:"中国",city:"香港",type:"A类",description:"亚洲最重要的电影节之一，以华语电影和亚洲电影的国际推广著称。2026年迎来第50届。",current_edition:"第50届",current_dates:"2026年3月25日—4月7日",current_status:"active",main_award:"火鸟奖"},
    {name:"北京国际电影节",name_en:"BJIFF",country:"中国",city:"北京",type:"A类",description:"天坛奖是中国唯一面向国际长片的竞赛单元，同期北京展映是最重要的艺术片展映平台。",current_edition:"第16届",current_dates:"2026年4月19—26日",current_status:"upcoming",main_award:"天坛奖"},
    {name:"上海国际电影节",name_en:"SIFF",country:"中国",city:"上海",type:"A类",description:"亚洲最大A类电影节，金爵奖主竞赛今年评委会主席由奉俊昊担任。",current_edition:"第30届",current_dates:"2026年6月14—23日",current_status:"upcoming",main_award:"金爵奖"},
    {name:"戛纳国际电影节",name_en:"Cannes",country:"法国",city:"戛纳",type:"A类",description:"世界最具声望的电影节，金棕榈奖是影史最高荣誉之一。",current_dates:"2026年5月13—24日",current_status:"upcoming",main_award:"金棕榈"},
    {name:"威尼斯国际电影节",name_en:"Venice",country:"意大利",city:"威尼斯",type:"A类",description:"历史最悠久的国际电影节，金狮奖以大胆的艺术电影著称。",current_dates:"2026年8月27日—9月6日",current_status:"upcoming",main_award:"金狮奖"},
    {name:"柏林国际电影节",name_en:"Berlinale",country:"德国",city:"柏林",type:"A类",description:"三大中政治性最强的电影节，金熊奖历来关注社会议题影片。",current_dates:"2026年2月13—23日",current_status:"past",main_award:"金熊奖"},
    {name:"台湾金马奖",name_en:"Golden Horse",country:"中国",city:"台湾",type:"综合",description:"华语影坛最权威的电影奖项，以独立精神和评审标准著称。",current_dates:"2026年11月",current_status:"upcoming",main_award:"金马奖"},
    {name:"釜山国际电影节",name_en:"BIFF",country:"韩国",city:"釜山",type:"A类",description:"亚洲最重要的电影节，亚洲新导演最重要展映平台。",current_dates:"2026年10月2—11日",current_status:"upcoming",main_award:"新浪潮奖"},
    {name:"东京国际电影节",name_en:"TIFF",country:"日本",city:"东京",type:"A类",description:"亚洲A类电影节，东京樱花奖专注亚洲电影。",current_dates:"2026年10—11月",current_status:"upcoming",main_award:"东京樱花奖"},
    {name:"新加坡国际电影节",name_en:"SGIFF",country:"新加坡",city:"新加坡",type:"地区",description:"东南亚最重要的电影节，重点关注东南亚及亚洲新兴电影人。",current_dates:"2026年11月",current_status:"upcoming",main_award:"银幕奖"},
    {name:"圣丹斯电影节",name_en:"Sundance",country:"美国",city:"帕克城",type:"独立",description:"独立电影圣地，大量重要独立电影在此首映。",current_dates:"2026年1月23日—2月2日",current_status:"past",main_award:"评审团大奖"},
    {name:"多伦多国际电影节",name_en:"TIFF",country:"加拿大",city:"多伦多",type:"A类",description:"观众选择奖常被视为奥斯卡风向标。",current_dates:"2026年9月4—14日",current_status:"upcoming",main_award:"观众选择奖"},
  ];
  allFests=fallback;
  render();
}

load();
</script>
</body>
</html>

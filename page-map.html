<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cine Ours — 世界电影信号地图</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
:root {
  --bg: #07080a;
  --bg-sidebar: rgba(10, 12, 18, 0.97);
  --gold: #c9a84c;
  --gold2: rgba(201, 168, 76, 0.58);
  --gold3: rgba(201, 168, 76, 0.18);
  --green: #4ade80;
  --text: rgba(237, 232, 223, 1);
  --text2: rgba(237, 232, 223, 0.42);
  --text3: rgba(237, 232, 223, 0.18);
  --text4: rgba(237, 232, 223, 0.08);
  --border: rgba(255, 255, 255, 0.055);
  --serif: Georgia, "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --ease: cubic-bezier(0.25, 0, 0.1, 1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
input,button{font-family:inherit}
a{color:inherit;text-decoration:none}

@keyframes blink {
  0%, 100% { opacity: 1 }
  50% { opacity: 0.3 }
}

.app{display:flex;flex-direction:column;height:100%;background:var(--bg)}

.body{flex:1;min-height:0;display:flex;min-width:0}

.sidebar{width:196px;flex-shrink:0;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
.sb-head{padding:12px 14px 8px;border-bottom:1px solid var(--border)}
.sb-live{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:0.2em;color:var(--text3);text-transform:uppercase;margin-bottom:10px}
.sb-live i{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s ease-in-out infinite;flex-shrink:0}
.sb-search{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:3px;background:rgba(0,0,0,0.35);font-size:10px;color:var(--text2)}
.sb-search::placeholder{color:var(--text4);font-style:italic}
.sb-hint{padding:5px 13px;border-bottom:1px solid rgba(255,255,255,0.026);font-size:8px;color:rgba(237,232,223,0.16);font-style:italic;letter-spacing:0.02em;line-height:1.5}
.sb-list{flex:1;overflow-y:auto;min-height:0}
.city-list{scrollbar-width:none}
.city-list::-webkit-scrollbar{display:none}
.sb-item{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.026);cursor:pointer;transition:background 0.2s,border-color 0.2s;border-left:2px solid transparent}
.sb-item:hover{background:rgba(255,255,255,0.02)}
.sb-item.on{border-left-color:var(--gold);background:rgba(201,168,76,0.04)}
.sb-item .pl-type{font-size:7px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(201,168,76,0.32);margin-bottom:4px}
.sb-item .t1{font-family:var(--serif);font-size:13px;color:rgba(237,232,223,0.5);line-height:1.2}
.sb-item.on .t1{color:rgba(237,232,223,0.9)}
.sb-item .t2{font-size:9px;color:var(--text4);margin-top:3px;line-height:1.3}
.sb-item.on .t2,.sb-item.active .t2,.city-item.active .ci-sub{color:rgba(74,222,128,0.48)}
.sb-foot{padding:12px 14px;border-top:1px solid var(--border)}
.sb-foot a{font-size:9px;font-style:italic;color:rgba(201,168,76,0.35);transition:color 0.2s}
.sb-foot a:hover{color:var(--gold2)}

.map-wrap{flex:1;position:relative;min-width:0;background:#0a0c14}
.map-title{position:absolute;top:18px;left:16px;z-index:5;pointer-events:none;max-width:280px}
#map-hl h1{margin:0;font-family:var(--serif);font-size:16px;font-style:italic;font-weight:400;color:rgba(237,232,223,0.68);line-height:1.5}
#map-hl p{margin:0;margin-top:5px;font-size:8px;color:rgba(201,168,76,0.38);letter-spacing:0.04em}
#mapSvg{display:block;width:100%;height:100%}

.zoom-ctl{position:absolute;right:10px;bottom:12px;z-index:8;display:flex;flex-direction:column;gap:4px;opacity:0.15;transition:opacity 0.25s}
.map-wrap:hover .zoom-ctl{opacity:0.6}
.zoom-ctl button{width:20px;height:20px;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.08);color:var(--text2);font-size:14px;line-height:1;cursor:pointer;border-radius:2px}

#float-card{position:absolute;right:20px;top:50%;width:260px;max-width:calc(100vw - 240px - 60px);z-index:20;
  background:rgba(12,14,20,0.92);backdrop-filter:blur(22px);
  border:1px solid rgba(201,168,76,0.14);border-radius:8px;
  box-shadow:0 20px 70px rgba(0,0,0,0.65);
  transform:translateY(-50%) translateX(12px);opacity:0;
  transition:opacity 0.65s var(--ease),transform 0.65s var(--ease)}
#float-card.show{opacity:1;transform:translateY(-50%) translateX(0)}
#float-card.fade-out{opacity:0;transition:opacity 0.3s ease}
.fc-img{height:160px;position:relative;overflow:hidden;border-radius:7px 7px 0 0}
.fc-still-inner{position:absolute;inset:0;background:linear-gradient(170deg,#1c1208 0%,#100e06 30%,#080a0c 65%,#05080e 100%)}
.fc-grain{position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
  opacity:0.4}
.fc-img img,.fc-img .ph{position:relative;z-index:2;width:100%;height:100%;object-fit:cover;display:block;filter:brightness(0.72) contrast(1.05) saturate(0.78)}
.fc-img .ph{z-index:2;background:transparent}
.fc-img::after{content:'';position:absolute;inset:0;z-index:3;background:linear-gradient(to top,rgba(12,14,20,0.92) 0%,transparent 55%);pointer-events:none}
.fc-cap{position:absolute;left:12px;bottom:10px;z-index:4}
.fc-type{font-size:7px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(201,168,76,0.45);margin-bottom:4px}
.fc-cap .v{font-family:var(--serif);font-size:11px;color:rgba(237,232,223,0.75)}
.fc-cap .c{font-size:8px;letter-spacing:0.12em;color:rgba(201,168,76,0.65);margin-top:3px}
.fc-body{padding:14px 16px 16px}
.fc-quote{font-family:var(--serif);font-size:15px;line-height:1.55;color:rgba(237,232,223,0.88);padding-left:12px;border-left:2px solid var(--gold3);margin-bottom:12px}
.fc-meta{font-size:9px;color:var(--text3);display:flex;align-items:center;gap:8px;margin-bottom:14px}
.fc-meta .likes{color:rgba(201,168,76,0.45)}
.fc-actions{display:flex;gap:8px}
.fc-btn-ghost{flex:1;padding:10px;border:1px solid rgba(255,255,255,0.14);border-radius:4px;background:transparent;color:rgba(237,232,223,0.42);font-size:12px;cursor:pointer;transition:background 0.2s,border-color 0.2s}
.fc-btn-ghost:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.22)}
.fc-btn-gold{flex:1;padding:10px;border:1px solid var(--gold2);border-radius:4px;background:transparent;color:var(--gold);font-size:12px;cursor:pointer;transition:background 0.2s}
.fc-btn-gold:hover{background:rgba(201,168,76,0.08)}

.film-strip{flex-shrink:0;height:150px;border-top:1px solid var(--border);display:flex;background:var(--bg);min-height:0}
.fs-lbl{width:52px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--border);padding:8px 4px}
.fs-lbl-city{font-family:Georgia,serif;font-size:8.5px;color:rgba(201,168,76,0.52);writing-mode:vertical-rl;letter-spacing:0.06em}
.fs-lbl-sub{font-size:6.5px;color:rgba(237,232,223,0.13);writing-mode:vertical-rl;letter-spacing:0.1em;margin-top:4px}
.fs-scroll{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;align-items:stretch;cursor:grab;scrollbar-width:thin;user-select:none;-webkit-user-select:none}
.fs-scroll:active{cursor:grabbing}
.fs-scroll::-webkit-scrollbar{height:4px}
.fs-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.fs-inner{display:flex;gap:0;padding:0 8px;align-items:stretch}
.film-frame.fs-frame,.fs-frame{width:152px;flex-shrink:0;padding:10px 8px 12px;position:relative;opacity:0.46;transition:opacity 0.25s;cursor:pointer}
.fs-frame.on{opacity:1}
.fs-frame .im{height:78px;border-radius:4px;overflow:hidden;position:relative;margin-bottom:8px}
.fs-frame .ff-type{position:absolute;top:6px;left:7px;z-index:2;font-size:6.5px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(237,232,223,0.22);pointer-events:none}
.fs-frame.on .ff-type{color:rgba(201,168,76,0.38)}
.fs-frame .im img,.fs-frame .im .ph{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(0.7) saturate(0.75)}
.fs-frame .im img.ff-img{height:78px}
.fs-frame .im .ph{background:repeating-linear-gradient(-28deg,#0a0c12 0 6px,#141820 6px 12px)}
.fs-frame .nm{font-size:9.5px;color:rgba(237,232,223,0.45);line-height:1.25}
.fs-frame.on .nm{color:rgba(237,232,223,0.88)}
.fs-frame .qt{font-size:8.5px;font-style:italic;font-family:var(--serif);color:rgba(237,232,223,0.2);margin-top:4px;line-height:1.35;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.fs-frame.on .qt{color:rgba(201,168,76,0.5)}
.fs-frame .bar{position:absolute;bottom:0;left:8px;right:8px;height:1.5px;background:transparent;transition:background 0.2s}
.fs-frame.on .bar{background:var(--gold)}
.fs-all{width:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-left:1px solid var(--border);font-size:9px;color:rgba(201,168,76,0.45);cursor:pointer;writing-mode:vertical-rl;transform:rotate(180deg)}
.fs-all:hover{color:var(--gold)}
</style>
</head>
<body>
<div class="app">
  <div class="body" id="body">
    <aside class="sidebar">
      <div class="sb-head">
        <div class="sb-live"><i></i>正在发生</div>
        <input class="sb-search" id="cityFilter" type="search" placeholder="🔍 搜索城市 / 国家" autocomplete="off">
      </div>
      <div class="sb-hint">刚刚有人在世界某处留下了记录</div>
      <div class="sb-list city-list" id="cityList"></div>
      <div class="sb-foot"><a href="#" onclick="navigate('page-festivals');return false">让地图带我去别处 →</a></div>
    </aside>

    <main class="map-wrap" id="mapWrap">
      <div class="map-title" id="map-hl">
        <h1 class="l1">世界很大，<br>电影让我们在同一时刻相遇。</h1>
        <p>探索真实的电影现场，留下你的记录。</p>
      </div>
      <svg id="mapSvg" aria-label="世界电影信号地图"></svg>
      <div class="zoom-ctl">
        <button type="button" id="zoomIn" title="放大">+</button>
        <button type="button" id="zoomOut" title="缩小">−</button>
      </div>
      <div id="float-card">
        <div class="fc-img" id="fcImg"></div>
        <div class="fc-body">
          <div class="fc-quote" id="fcQuote"></div>
          <div class="fc-meta"><span id="fcUser"></span><span class="likes" id="fcLikes"></span></div>
          <div class="fc-actions">
            <button type="button" class="fc-btn-ghost">查看场景</button>
            <button type="button" class="fc-btn-gold">我也来打卡</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="film-strip">
    <div class="fs-lbl">
      <span class="fs-lbl-city" id="fsLblCity">柏林</span>
      <span class="fs-lbl-sub">电影发生过的地方</span>
    </div>
    <div class="fs-scroll" id="fsScroll">
      <div class="fs-inner" id="fsInner"></div>
    </div>
    <div class="fs-all" onclick="navigate('page-festivals')">全部→</div>
  </div>
</div>

function navigate(page) {
  try {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'navigate', page: page }, '*');
    }
  } catch (e) {}
}

var activeId = 'berlin';
var worldData = null;
var mapWrap = document.getElementById('mapWrap');
var svgEl = document.getElementById('mapSvg');
var floatCard = document.getElementById('float-card');

var zoomK = 1;

function cityById(id) {
  for (var i = 0; i < CITIES.length; i++) if (CITIES[i].id === id) return CITIES[i];
  return CITIES[0];
}

function updateFsLblCity() {
  var el = document.getElementById('fsLblCity');
  if (el) el.textContent = cityById(activeId).zh;
}

function renderCityList(filter) {
  var q = (filter || '').trim().toLowerCase();
  var list = document.getElementById('cityList');
  list.innerHTML = '';
  CITIES.forEach(function (c) {
    var hay = (c.zh + c.en + c.venue).toLowerCase();
    if (q && hay.indexOf(q) === -1) return;
    var div = document.createElement('div');
    div.className = 'sb-item city-item' + (c.id === activeId ? ' on active' : '');
    div.dataset.id = c.id;
    div.innerHTML = '<div class="pl-type">' + (c.locType || '影院现场') + '</div>'
      + '<div class="t1">' + c.zh + '</div>'
      + '<div class="t2 ci-sub">' + c.sub + '</div>';
    div.onclick = function () { selectCity(c.id); };
    list.appendChild(div);
  });
}

function updateFloatCard(c, skipAnim) {
  var fcImg = document.getElementById('fcImg');
  var fcQuote = document.getElementById('fcQuote');
  var fcUser = document.getElementById('fcUser');
  var fcLikes = document.getElementById('fcLikes');
  function fill() {
    fcQuote.textContent = c.quote;
    fcUser.textContent = c.user;
    fcLikes.textContent = '♡ ' + c.likes;
    fcImg.innerHTML = '<div class="fc-still-inner"></div><div class="fc-grain"></div>';
    var still = fcImg.querySelector('.fc-still-inner');
    var photo = VENUE_PHOTOS[c.id];
    if (photo) {
      var im = document.createElement('img');
      im.src = photo;
      im.alt = c.venue;
      still.appendChild(im);
    }
    var cap = document.createElement('div');
    cap.className = 'fc-cap';
    cap.innerHTML = '<div class="fc-type">' + (c.locType || '影院现场') + '</div>'
      + '<div class="v">' + c.venue + '</div>'
      + '<div class="c">' + c.en + ' · ' + c.country + '</div>';
    still.appendChild(cap);
  }
  if (skipAnim) {
    fill();
    return;
  }
  floatCard.classList.add('fade-out');
  setTimeout(function () {
    fill();
    floatCard.classList.remove('fade-out');
    floatCard.classList.add('show');

}

function renderFilmStrip() {
  var inner = document.getElementById('fsInner');
  inner.innerHTML = '';
  FRAMES.forEach(function (f) {
    var d = document.createElement('div');
    d.className = 'fs-frame film-frame' + (f.cityId === activeId ? ' on' : '');
    d.dataset.city = f.cityId;
    var stripUrl = VENUE_PHOTOS[f.cityId];
    var locType = f.locType || '电影地标';
    var imh = '<div class="im"><span class="ff-type">' + locType + '</span>';
    if (stripUrl) imh += '<img class="ff-img" src="' + stripUrl + '" alt="">';
    else imh += '<div class="ph"></div>';
    imh += '</div>';
    d.innerHTML = imh + '<div class="nm">' + f.name + '</div><div class="qt">「' + f.quote + '」</div><div class="bar"></div>';
    d.onclick = function () { selectCity(f.cityId); };
    inner.appendChild(d);
  });

function selectCity(id) {
  activeId = id;
  renderCityList(document.getElementById('cityFilter').value);
  renderFilmStrip();
  updateFsLblCity();
  updateFloatCard(cityById(id), false);
  renderMapLayers();
}
window.selectCity = selectCity;

function arcPath(projection, from, to) {
  var a = projection([from.lng, from.lat]);
  var b = projection([to.lng, to.lat]);
  if (!a || !b) return '';
  var mx = (a[0] + b[0]) / 2, my = (a[1] + b[1]) / 2;
  var dx = b[0] - a[0], dy = b[1] - a[1];
  var len = Math.sqrt(dx * dx + dy * dy) || 1;
  var ox = -dy / len * 40, oy = dx / len * 40;
  var cx = mx + ox, cy = my + oy;
  return 'M' + a[0] + ',' + a[1] + ' Q' + cx + ',' + cy + ' ' + b[0] + ',' + b[1];
}

function arcStrokeOpacity(projection, active, c, w, h) {
  var a = projection([active.lng, active.lat]);
  var b = projection([c.lng, c.lat]);
  if (!a || !b) return 0.12;
  var dx = b[0] - a[0], dy = b[1] - a[1];
  var dist = Math.sqrt(dx * dx + dy * dy);
  var maxD = Math.min(w, h) * 0.45;
  var t = Math.min(1, dist / maxD);
  if (t < 0.33) return 0.16;
  if (t < 0.66) return 0.12;
  return 0.08;
}

function scaleRgbaAlpha(rgba, factor) {
  return rgba.replace(/rgba\(\s*([^)]+)\s*\)/, function (_, inner) {
    var p = inner.split(',').map(function (s) { return s.trim(); });
    if (p.length < 4) return rgba;
    var a = parseFloat(p[3]);
    if (isNaN(a)) return rgba;
    p[3] = String(Math.min(1, Math.max(0, a * factor)));
    return 'rgba(' + p.join(', ') + ')';
  });
}

function renderMapLayers() {
  var w = mapWrap.clientWidth, h = mapWrap.clientHeight;
  if (w < 2 || h < 2) return;
  var projection = d3.geoNaturalEarth1()
    .scale(Math.min(w / 6.2, h / 3.2) * zoomK)
    .translate([w / 2, h / 2]);
  var path = d3.geoPath().projection(projection);
  var svg = d3.select(svgEl);
  svg.selectAll('*').remove();
  svg.attr('width', w).attr('height', h).attr('viewBox', '0 0 ' + w + ' ' + h);

  var zSpan = 2.2 - 0.65;
  var zMap6 = Math.max(0, Math.min(6, ((zoomK - 0.65) / zSpan) * 6));
  var zMap5 = Math.max(0, Math.min(5, ((zoomK - 0.65) / zSpan) * 5));
  function heatOpacityVal() {
    if (zMap6 <= 3) return 0.82;
    if (zMap6 >= 6) return 0.45;
    return 0.82 + (0.45 - 0.82) * ((zMap6 - 3) / 3);
  }
  function heatIntensityVal() {
    return 0.28 + (1.0 - 0.28) * (zMap5 / 5);
  }
  function heatRadiusVal() {
    if (zMap5 <= 3) return 12 + (22 - 12) * (zMap5 / 3);
    return 22 + (35 - 22) * ((zMap5 - 3) / 2);
  }
  var heatInt = heatIntensityVal();
  var heatOp = heatOpacityVal();
  var radBase = heatRadiusVal();

  var defs = svg.append('defs');
  var grad = defs.append('radialGradient').attr('id', 'heatG').attr('cx', '50%').attr('cy', '50%').attr('r', '50%');
  [[0, 'rgba(0,0,0,0)'], [0.07, 'rgba(25,12,2,0.4)'], [0.22, 'rgba(55,30,5,0.5)'], [0.42, 'rgba(95,55,8,0.58)'], [0.62, 'rgba(138,88,18,0.63)'], [0.8, 'rgba(168,115,32,0.67)'], [1, 'rgba(205,158,62,0.78)']].forEach(function (st) {
    grad.append('stop').attr('offset', (st[0] * 100) + '%').attr('stop-color', scaleRgbaAlpha(st[1], heatInt));
  });
  var softBlur = defs.append('filter').attr('id', 'softBlur').attr('x', '-50%').attr('y', '-50%').attr('width', '200%').attr('height', '200%');
  softBlur.append('feGaussianBlur').attr('in', 'SourceGraphic').attr('stdDeviation', 4);
  var heatBlur = defs.append('filter').attr('id', 'heatBlur').attr('x', '-100%').attr('y', '-100%').attr('width', '300%').attr('height', '300%');
  heatBlur.append('feGaussianBlur').attr('in', 'SourceGraphic').attr('stdDeviation', 8);
  var landBlur = defs.append('filter').attr('id', 'land-blur');
  landBlur.append('feGaussianBlur').attr('in', 'SourceGraphic').attr('stdDeviation', 1.2);
  var dotGlow = defs.append('filter').attr('id', 'dot-glow');
  dotGlow.append('feGaussianBlur').attr('in', 'SourceGraphic').attr('stdDeviation', 3).attr('result', 'blur');
  var dotMerge = dotGlow.append('feMerge');
  dotMerge.append('feMergeNode').attr('in', 'blur');
  dotMerge.append('feMergeNode').attr('in', 'SourceGraphic');

  var root = svg.append('g').attr('class', 'map-root');
  root.append('rect').attr('width', w).attr('height', h).attr('fill', '#0a0c14');

  var gx = root.append('g').attr('class', 'grid');
  for (var i = 1; i <= 3; i++) {
    gx.append('line').attr('x1', 0).attr('x2', w).attr('y1', h * i / 4).attr('y2', h * i / 4)
      .attr('stroke', 'rgba(255,255,255,0.01)').attr('stroke-width', 0.3).attr('stroke-dasharray', '6 14');
  }
  for (var j = 1; j <= 3; j++) {
    gx.append('line').attr('y1', 0).attr('y2', h).attr('x1', w * j / 4).attr('x2', w * j / 4)
      .attr('stroke', 'rgba(255,255,255,0.01)').attr('stroke-width', 0.3).attr('stroke-dasharray', '6 14');
  }

  if (worldData) {
    var countries = topojson.feature(worldData, worldData.objects.countries);
    var landG = root.append('g').attr('class', 'land').attr('filter', 'url(#land-blur)').attr('opacity', 0.85);
    landG.selectAll('path.land-fill')
      .data(countries.features)
      .join('path')
      .attr('class', 'land-fill')
      .attr('d', path)
      .attr('fill', 'rgba(255,255,255,0.11)')
      .attr('stroke', 'none');
    landG.selectAll('path.land-stroke')
      .data(countries.features)
      .join('path')
      .attr('class', 'land-stroke')
      .attr('d', path)
      .attr('fill', 'none')
      .attr('stroke', 'rgba(255,255,255,0.16)')
      .attr('stroke-width', 0.6);
  }

  var heatG = root.append('g').attr('class', 'heat').attr('opacity', heatOp);
  HEAT_CITIES.forEach(function (coord, idx) {
    var p = projection(coord);
    if (!p) return;
    var rad = radBase * (0.94 + (idx % 3) * 0.04);
    heatG.append('circle')
      .attr('cx', p[0]).attr('cy', p[1]).attr('r', rad)
      .attr('fill', 'url(#heatG)')
      .attr('filter', 'url(#heatBlur)');
  });

  var active = cityById(activeId);
  var arcG = root.append('g').attr('class', 'arcs');
  CITIES.forEach(function (c) {
    if (c.id === activeId) return;
    var d = arcPath(projection, active, c);
    if (d) {
      var arcOp = arcStrokeOpacity(projection, active, c, w, h);
      arcG.append('path')
        .attr('d', d)
        .attr('fill', 'none')
        .attr('stroke', 'rgba(201,168,76,' + arcOp + ')')
        .attr('stroke-width', 0.55)
        .attr('stroke-dasharray', '2 8');
    }
  });

  var markers = root.append('g').attr('class', 'markers');
  CITIES.forEach(function (c) {
    var p = projection([c.lng, c.lat]);
    if (!p) return;
    var g = markers.append('g').attr('transform', 'translate(' + p[0] + ',' + p[1] + ')').attr('class', 'city-g').style('cursor', 'pointer');
    if (c.id === activeId) {
      g.append('circle').attr('r', 16).attr('fill', 'rgba(201,168,76,0.08)').attr('filter', 'url(#softBlur)');
      var mid = g.append('circle').attr('r', 9).attr('fill', 'rgba(201,168,76,0.2)');
      mid.append('animate').attr('attributeName', 'r').attr('values', '9;14;9').attr('dur', '2.4s').attr('repeatCount', 'indefinite');
      mid.append('animate').attr('attributeName', 'opacity').attr('values', '0.5;0.15;0.5').attr('dur', '2.4s').attr('repeatCount', 'indefinite');
      g.append('circle').attr('r', 5).attr('fill', '#f0c86a').attr('filter', 'url(#dot-glow)')
        .append('animate').attr('attributeName', 'opacity').attr('values', '1;0.65;1').attr('dur', '2.4s').attr('repeatCount', 'indefinite');
      g.append('text').attr('text-anchor', 'middle').attr('y', -14).attr('font-family', 'Georgia, Times New Roman, serif').attr('font-size', 12).attr('fill', 'rgba(237,232,223,0.82)').text(c.zh);
    } else {
      var oc = g.append('circle').attr('r', 2).attr('fill', '#c9a84c').attr('opacity', 0.12);
      g.append('title').text(c.zh + ' · ' + c.venue);
      g.on('mouseenter', function () { oc.attr('opacity', 0.35); });
      g.on('mouseleave', function () { oc.attr('opacity', 0.12); });
    }
    g.on('click', function () { selectCity(c.id); });
  });
}

function renderFallback() {
  window._fallbackMode = true;
  worldData = null;
  renderMapLayers();
}

function applyWorldData(data) {
  try {
    if (typeof topojson === 'undefined') throw new Error('topojson missing');
    topojson.feature(data, data.objects.countries);
    worldData = data;
    window._fallbackMode = false;
    renderMapLayers();
  } catch (e) {
    renderFallback();
  }
}

function setupResize() {
  var ro = new ResizeObserver(function () { renderMapLayers(); });
  ro.observe(mapWrap);
}

function setupFilter() {
  document.getElementById('cityFilter').addEventListener('input', function () {
    renderCityList(this.value);
  });
}

function setupZoom() {
  document.getElementById('zoomIn').onclick = function () {
    zoomK = Math.min(2.2, zoomK * 1.12);
    renderMapLayers();
  };
  document.getElementById('zoomOut').onclick = function () {
    zoomK = Math.max(0.65, zoomK / 1.12);
    renderMapLayers();
  };
}

function setupFilmDrag() {
  var el = document.getElementById('fsScroll');
  var down = false, startX = 0, startScroll = 0;
  el.addEventListener('mousedown', function (e) {
    down = true;
    startX = e.pageX;
    startScroll = el.scrollLeft;
    el.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', function (e) {
    if (!down) return;
    el.scrollLeft = startScroll - (e.pageX - startX) * 1.2;
  });
  window.addEventListener('mouseup', function () {
    down = false;
    el.style.cursor = 'grab';
  });
}

function init() {
  renderCityList('');
  renderFilmStrip();
  updateFsLblCity();
  updateFloatCard(cityById(activeId), true);
  floatCard.classList.add('show');
  setupFilter();
  setupResize();
  setupZoom();
  setupFilmDrag();

  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(function (r) { return r.json(); })
    .then(function (data) { applyWorldData(data); })
    .catch(function () { renderFallback(); });

  setTimeout(function () { renderMapLayers(); }, 50);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

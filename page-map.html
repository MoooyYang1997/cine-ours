<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界信号地图 · CineOurs</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#07080a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:rgba(237,232,223,1)}

:root{
  --gold:#c9a84c;
  --gold2:rgba(201,168,76,0.6);
  --border:rgba(255,255,255,0.055);
  --serif:Georgia,"Times New Roman",serif;
  --ease:cubic-bezier(0.25,0,0.1,1);
}

/* ── 整体容器 ── */
#page{
  display:flex;
  flex-direction:column;
  width:100%;
}

/* ── 上半部分：地图行，固定高度 ── */
#map-row{
  display:flex;
  height:500px;   /* 固定，不随viewport变化 */
  flex-shrink:0;
}

/* ── 左侧信号列表，固定宽度和高度 ── */
#sb{
  width:215px;
  flex-shrink:0;
  height:500px;
  background:#0a0c12;
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* sidebar head */
.sb-head{padding:13px 14px 10px;border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0}
.sb-live{display:flex;align-items:center;gap:5px;font-size:9px;color:rgba(74,222,128,0.62);letter-spacing:0.2em;margin-bottom:9px}
.sb-dot{width:4px;height:4px;border-radius:50%;background:#4ade80;animation:blink 2s ease-in-out infinite}
.sb-srch{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:3px;padding:5px 9px}
.sb-srch svg{flex-shrink:0;opacity:0.28}
#sb-inp{background:none;border:none;outline:none;font-size:10px;color:rgba(237,232,223,1);width:100%;font-style:italic;font-family:inherit}
#sb-inp::placeholder{color:rgba(237,232,223,0.16)}
#city-tabs{
  display:flex;flex-wrap:wrap;gap:5px;
  padding:8px 14px 6px;
  border-bottom:1px solid rgba(255,255,255,0.032);
  flex-shrink:0;
}
.ct{
  font-size:9px;padding:3px 8px;border-radius:2px;
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(237,232,223,0.38);cursor:pointer;
  letter-spacing:0.06em;transition:all 0.2s;white-space:nowrap;
}
.ct:hover{color:rgba(237,232,223,0.7);border-color:rgba(255,255,255,0.2)}
.ct.active{
  color:rgba(201,168,76,0.88);border-color:rgba(201,168,76,0.4);
  background:rgba(201,168,76,0.06);
}
.sb-hint{padding:5px 14px;border-bottom:1px solid rgba(255,255,255,0.032);font-size:8px;color:rgba(237,232,223,0.18);font-style:italic;flex-shrink:0}

/* place list */
#pl{flex:1;overflow-y:auto;scrollbar-width:none;padding:2px 0}
#pl::-webkit-scrollbar{display:none}
.pi{padding:9px 14px 8px;border-left:2px solid transparent;cursor:pointer;position:relative;transition:all 0.28s var(--ease)}
.pi+.pi::before{content:"";position:absolute;top:0;left:14px;right:14px;height:1px;background:rgba(255,255,255,0.024)}
.pi:hover{background:rgba(255,255,255,0.015)}
.pi.on{border-left-color:rgba(201,168,76,0.62);background:rgba(201,168,76,0.04)}
.pi-t{font-size:7.5px;letter-spacing:0.1em;color:rgba(237,232,223,0.22);margin-bottom:3px}
.pi.on .pi-t{color:rgba(201,168,76,0.48)}
.pi-n{font-family:var(--serif);font-size:13px;color:rgba(237,232,223,0.52);margin-bottom:2px;line-height:1.2}
.pi.on .pi-n{color:rgba(237,232,223,0.92)}
.pi-s{font-size:8px;color:rgba(237,232,223,0.18);font-style:italic}
.pi.on .pi-s{color:rgba(237,232,223,0.32)}

.sb-foot{padding:9px 14px;border-top:1px solid rgba(255,255,255,0.04);flex-shrink:0}
.sb-foot-t{font-size:8px;color:rgba(237,232,223,0.14);font-style:italic}

/* ── 地图区 ── */
#mw{
  flex:1;
  height:500px;
  position:relative;
  overflow:hidden;
  background:#0a0c14;
}
#ms{display:block;position:absolute;inset:0;width:100%;height:100%}

/* 地图标题 */
#mhl{position:absolute;top:18px;left:18px;pointer-events:none;z-index:5}
#mhl h1{font-family:var(--serif);font-size:15px;color:rgba(237,232,223,0.58);line-height:1.5;font-weight:400;font-style:italic;text-shadow:0 1px 16px rgba(0,0,0,0.99)}
#mhl p{font-size:8px;color:rgba(201,168,76,0.36);font-style:italic;margin-top:5px;letter-spacing:0.04em;text-shadow:0 1px 8px rgba(0,0,0,0.99)}

/* ── 浮层卡片 — 地图右上角，固定 ── */
#fc{
  position:absolute;right:20px;top:18px;
  width:256px;
  background:rgba(11,13,19,0.95);
  border:1px solid rgba(201,168,76,0.14);
  border-radius:7px;overflow:hidden;
  z-index:30;
  opacity:0;transform:translateX(8px);
  transition:opacity 0.55s var(--ease),transform 0.55s var(--ease);
  pointer-events:none;
  box-shadow:0 16px 50px rgba(0,0,0,0.75);
}
#fc.vis{opacity:1;transform:translateX(0);pointer-events:all}
.fc-img{height:140px;position:relative;overflow:hidden;background:#0c0e14}
.fc-img img{width:100%;height:100%;object-fit:cover;filter:brightness(0.68) contrast(1.05) saturate(0.72);display:block}
.fc-ph{width:100%;height:100%;background:linear-gradient(165deg,#1e1508 0%,#141008 35%,#090b10 70%,#060810 100%);position:relative}
.fc-ph::after{content:"";position:absolute;inset:0;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.02) 0,rgba(255,255,255,0.02) 1px,transparent 0,transparent 50%);background-size:5px 5px}
.fc-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(11,13,19,0.99) 0%,rgba(11,13,19,0.1) 52%,transparent 100%)}
.fc-bot{position:absolute;bottom:9px;left:13px;right:13px;z-index:2}
.fc-vn{font-size:11px;color:rgba(237,232,223,0.8);font-family:var(--serif)}
.fc-vc{font-size:7.5px;color:rgba(201,168,76,0.6);letter-spacing:0.12em;margin-top:2px}
.fc-b{padding:10px 13px 12px}
.fc-tp{font-size:7.5px;letter-spacing:0.1em;color:rgba(237,232,223,0.26);margin-bottom:4px}
.fc-fi{font-size:8.5px;color:rgba(201,168,76,0.5);font-style:italic;margin-bottom:8px}
.fc-q{font-family:var(--serif);font-size:15px;color:rgba(237,232,223,0.76);line-height:1.78;border-left:2px solid rgba(201,168,76,0.42);padding-left:9px;margin-bottom:9px}
.fc-u{display:flex;align-items:center;gap:6px;margin-bottom:9px}
.fc-av{width:16px;height:16px;border-radius:50%;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.18);flex-shrink:0}
.fc-un{font-size:8px;color:rgba(237,232,223,0.24)}
.fc-ht{margin-left:auto;font-size:8px;color:rgba(237,232,223,0.18)}
.fc-btns{display:flex;gap:6px;margin-bottom:7px}
.fc-bg{flex:1;padding:7px 0;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:3px;font-size:9.5px;color:rgba(237,232,223,0.44);text-align:center;cursor:pointer;font-family:inherit}
.fc-gd{flex:1;padding:7px 0;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.24);border-radius:3px;font-size:9.5px;color:rgba(201,168,76,0.9);text-align:center;cursor:pointer;font-family:inherit}
.fc-gd.done{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.08);color:rgba(201,168,76,0.45);cursor:default;opacity:0.85}
.fc-gd:disabled{cursor:default}
.fc-checkin{margin-top:8px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);display:none}
.fc-checkin.open{display:block}
.fc-checkin-lbl{font-size:8px;color:rgba(237,232,223,0.32);margin-bottom:6px;display:block}
.fc-checkin-note{width:100%;min-height:58px;resize:vertical;padding:8px 9px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:3px;color:rgba(237,232,223,0.72);font-size:10px;line-height:1.5;font-family:inherit;outline:none}
.fc-checkin-note:focus{border-color:rgba(201,168,76,0.28)}
.fc-checkin-actions{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px}
.fc-add-img{font-size:9px;color:rgba(237,232,223,0.42);cursor:pointer;padding:4px 0}
.fc-add-img:hover{color:rgba(201,168,76,0.7)}
.fc-submit{padding:6px 12px;background:rgba(201,168,76,0.14);border:1px solid rgba(201,168,76,0.32);border-radius:3px;font-size:9px;color:rgba(201,168,76,0.92);cursor:pointer;font-family:inherit}
.fc-submit:hover{background:rgba(201,168,76,0.22)}
.fc-submit:disabled{opacity:0.45;cursor:wait}
.fc-img-preview{margin-top:8px;position:relative;display:inline-block}
.fc-img-preview img{width:72px;height:72px;object-fit:cover;border-radius:3px;border:1px solid rgba(255,255,255,0.1);display:block}
.fc-img-rm{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:#1a1410;border:1px solid rgba(255,255,255,0.15);color:rgba(237,232,223,0.6);font-size:10px;line-height:14px;text-align:center;cursor:pointer}
.fc-records{display:none}
.fc-records.open{display:block}
.fc-detail.hide{display:none}
.fc-records-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.fc-records-back{background:none;border:none;color:rgba(201,168,76,0.55);font-size:9px;cursor:pointer;padding:0;font-family:inherit}
.fc-records-back:hover{color:rgba(201,168,76,0.85)}
.fc-records-title{font-size:9px;color:rgba(237,232,223,0.35);letter-spacing:0.06em}
.fc-records-list{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.fc-rec-item{padding:8px 9px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:3px}
.fc-rec-note{font-size:10px;color:rgba(237,232,223,0.62);line-height:1.55;margin-bottom:5px;white-space:pre-wrap}
.fc-rec-meta{font-size:7.5px;color:rgba(237,232,223,0.22)}
.fc-rec-img{width:100%;max-height:100px;object-fit:cover;border-radius:2px;margin-top:6px;display:block}
.fc-rec-empty{font-size:10px;color:rgba(237,232,223,0.24);font-style:italic;text-align:center;padding:18px 8px}
#map-toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-6px);background:rgba(18,16,12,0.96);border:1px solid rgba(201,168,76,0.28);color:rgba(237,232,223,0.92);font-size:11px;padding:9px 18px;border-radius:4px;z-index:9999;opacity:0;pointer-events:none;transition:opacity 0.25s,transform 0.25s;box-shadow:0 8px 28px rgba(0,0,0,0.55);max-width:90vw;text-align:center}
#map-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#map-toast.err{border-color:rgba(220,80,60,0.45);color:rgba(255,200,190,0.95)}

/* 缩放控件 */
#mc{position:absolute;right:10px;bottom:10px;display:flex;flex-direction:column;gap:4px;z-index:10;opacity:0.14;transition:opacity 0.25s}
#mc:hover{opacity:0.6}
.mcb{width:22px;height:22px;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.08);border-radius:3px;display:flex;align-items:center;justify-content:center;color:rgba(237,232,223,0.5);font-size:13px;cursor:pointer}

/* ── 底部地点条 ── */
#bs{
  display:flex;
  flex-shrink:0;
  background:#060709;
  border-top:1px solid rgba(255,255,255,0.048);
}

/* 左侧城市信息 */
#bsc{
  width:160px;
  flex-shrink:0;
  border-right:1px solid rgba(255,255,255,0.045);
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:24px 22px;
  gap:8px;
}
#bsn{font-family:var(--serif);font-size:28px;color:rgba(201,168,76,0.88);line-height:1.1}
#bss{font-size:10px;color:rgba(237,232,223,0.28);line-height:1.6;letter-spacing:0.03em;white-space:nowrap}
#bsk{font-size:9px;color:rgba(237,232,223,0.16);font-style:italic}

/* 右侧两行 */
#bsr{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* 每行 */
.brow{
  height:230px;   /* 固定行高 */
  flex-shrink:0;
  display:flex;
  align-items:stretch;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.brow:last-child{border-bottom:none}

/* 帧滚动区 */
.bfr{
  flex:1;
  display:flex;gap:12px;
  padding:14px 16px;
  overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;
  cursor:grab;user-select:none;
  align-items:center;
}
.bfr::-webkit-scrollbar{display:none}
.bfr.gr{cursor:grabbing}

/* CTA 右侧 */
.bcta{
  width:68px;flex-shrink:0;
  border-left:1px solid rgba(255,255,255,0.04);
  display:flex;align-items:center;justify-content:center;
  padding:0 8px;cursor:pointer;
}
.bcta-t{
  font-size:10px;color:rgba(201,168,76,0.5);
  font-style:italic;writing-mode:vertical-rl;
  letter-spacing:0.06em;line-height:1.4;text-align:center;
}

/* 帧卡片 */
.bf{
  flex-shrink:0;width:200px;
  border-radius:4px;overflow:hidden;
  background:#0d0f12;cursor:pointer;
  position:relative;opacity:0.5;
  transition:opacity 0.2s,transform 0.2s;
}
.bf:hover{opacity:0.8;transform:translateY(-2px)}
.bf.on{opacity:1}
.bf.on::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(201,168,76,0.58)}
.bf-img{height:148px;overflow:hidden;position:relative;background:#0d0f12}
.bf-img img{width:100%;height:100%;object-fit:cover;display:block}
.bf-ph{width:100%;height:100%;background:#0d0f12}
.bf-tp{position:absolute;top:6px;left:8px;font-size:7.5px;letter-spacing:0.08em;color:rgba(237,232,223,0.32)}
.bf-in{padding:10px 12px 11px}
.bf-nm{font-size:12px;color:rgba(237,232,223,0.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;transition:color 0.2s}
.bf.on .bf-nm{color:rgba(237,232,223,0.88)}
.bf-fm{
  font-size:8.5px;color:rgba(201,168,76,0.52);font-style:italic;
  margin-bottom:4px;letter-spacing:0.03em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.bf-qu{font-size:10px;color:rgba(237,232,223,0.22);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--serif);transition:color 0.2s}
.bf.on .bf-qu{color:rgba(201,168,76,0.5)}

/* 动画 */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>

<div id="page">
  <!-- 地图行 -->
  <div id="map-row">

    <!-- 左侧信号列表 -->
    <aside id="sb">
      <div class="sb-head">
        <div class="sb-live"><div class="sb-dot"></div>正在发生</div>
        <div class="sb-srch">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="rgba(237,232,223,0.38)" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
          <input id="sb-inp" type="text" placeholder="搜索城市、影院或电影地标" oninput="doFilter(this.value)">
        </div>
      </div>
      <div id="city-tabs"></div>
      <div class="sb-hint">刚刚有人在世界某处留下了记录</div>
      <div id="pl"></div>
      <div class="sb-foot"><div class="sb-foot-t">正在接收世界各地的电影信号</div></div>
    </aside>

    <!-- 地图 -->
    <div id="mw">
      <svg id="ms"></svg>
      <div id="mhl">
        <h1>世界很大，<br>电影让我们在同一时刻相遇。</h1>
        <p>探索电影发生过的地方，留下你的记录。</p>
      </div>

      <!-- 浮层卡片 -->
      <div id="fc">
        <div class="fc-img">
          <img id="fc-im" src="" alt="" style="display:none"/>
          <div id="fc-ph" class="fc-ph" style="display:none"></div>
          <div class="fc-grad"></div>
          <div class="fc-bot">
            <div id="fc-vn" class="fc-vn"></div>
            <div id="fc-vc" class="fc-vc"></div>
          </div>
        </div>
        <div class="fc-b">
          <div id="fc-detail" class="fc-detail">
          <div id="fc-tp" class="fc-tp"></div>
          <div id="fc-fi" class="fc-fi" style="display:none"></div>
          <div id="fc-q" class="fc-q"></div>
          <div class="fc-u">
            <div class="fc-av"></div>
            <span id="fc-un" class="fc-un"></span>
            <span class="fc-ht">&#9825; <span id="fc-lk">0</span></span>
          </div>
          <div class="fc-btns">
            <button type="button" id="fc-b1" class="fc-bg">查看全部记录</button>
            <button type="button" id="fc-btn-checkin" class="fc-gd">我也来打卡</button>
          </div>
          <div id="fc-checkin" class="fc-checkin">
            <label class="fc-checkin-lbl" for="fc-note">写下你在这里的感受（选填）</label>
            <textarea id="fc-note" class="fc-checkin-note" rows="3"></textarea>
            <div id="fc-img-preview" class="fc-img-preview" style="display:none">
              <img id="fc-preview-img" src="" alt=""/>
              <button type="button" id="fc-img-rm" class="fc-img-rm" aria-label="移除图片">×</button>
            </div>
            <div class="fc-checkin-actions">
              <label class="fc-add-img">
                <input type="file" id="fc-file" accept="image/*" hidden/>
                📷 添加图片
              </label>
              <button type="button" id="fc-submit-checkin" class="fc-submit">提交打卡</button>
            </div>
          </div>
          </div>
          <div id="fc-records" class="fc-records">
            <div class="fc-records-head">
              <button type="button" id="fc-records-back" class="fc-records-back">← 返回</button>
              <span class="fc-records-title" id="fc-records-title">全部记录</span>
            </div>
            <div id="fc-records-list" class="fc-records-list"></div>
          </div>
        </div>
      </div>

      <div id="mc">
        <div class="mcb" id="zi">+</div>
        <div class="mcb" id="zo">−</div>
      </div>
    </div>
  </div>

  <!-- 底部地点条 -->
  <div id="bs">
    <div id="bsc">
      <div id="bsn">—</div>
      <div id="bss">电影发生过的地方</div>
      <div id="bsk"></div>
    </div>
    <div id="bsr">
      <!-- 电影地标行 -->
      <div class="brow">
        <div id="fr-fl" class="bfr"></div>
        <div class="bcta"><span class="bcta-t">我来<br>添加 →</span></div>
      </div>
      <!-- 影院现场行 -->
      <div class="brow">
        <div id="fr-ci" class="bfr"></div>
        <div class="bcta"><span class="bcta-t">我来<br>打卡 →</span></div>
      </div>
    </div>
  </div>
</div>

<script src="supabase.js"></script>

var PLACE_IMG_SLUGS={esc:'escalator-hk',ck:'chunking-mansion',tsk:'star-ferry',szh:'suzhou-creek',gdt:'guling-st',xmt:'ximending',sbk:'shibuya-cross',trv:'trevi',cnp:'croisette'};
var CINEMA_IMG_SLUGS={hkcc:'hkcec',bwy:'kubrick-hk',dgm:'daguangming',gdt2:'spot-taipei',bab:'babylon-kino',cin:'cinematheque',pnt:'pantheon-cinema'};
function applyPlaceImages(db){
  PL.forEach(function(p){
    if(p.img)return;
    var slug=PLACE_IMG_SLUGS[p.id],row=slug?db[slug]:null;
    if(!row){for(var k in db){if(db[k].place===p.nm){row=db[k];break;}}}
    if(row&&row.images&&row.images.length){
      var im=row.images[0];
      p.img=im.thumb||im.url;
    }
  });
}
function applyCinemaImages(db){
  PL.forEach(function(p){
    if(p.img||p.tp!=='ci')return;
    var slug=CINEMA_IMG_SLUGS[p.id],row=slug?db[slug]:null;
    if(!row){for(var k in db){if(db[k].name===p.nm){row=db[k];break;}}}
    if(row&&row.images&&row.images.length){
      var im=row.images[0];
      p.img=im.thumb||im.url;
    }
  });
}

/** 油猴上传到 place-images/places/{id}/ 的封面（优先于 JSON） */
function applySupabaseStorageCovers(){
  return ensureSbReady().then(function(sb){
    var jobs=PL.map(function(p){
      return sb.storage.from('place-images').list('places/'+p.id,{
        limit:1,
        sortBy:{column:'created_at',order:'desc'}
      }).then(function(res){
        if(res.error||!res.data||!res.data.length)return;
        var file=res.data[0];
        if(!file.name)return;
        var path='places/'+p.id+'/'+file.name;
        var pub=sb.storage.from('place-images').getPublicUrl(path);
        if(pub.data&&pub.data.publicUrl)p.img=pub.data.publicUrl;
      });
    });
    return Promise.all(jobs);
  }).catch(function(e){
    console.warn('Supabase storage covers',e);
  });
}

/* ── 地图初始化 ── */
function buildMap(){
  var wrap=document.getElementById('mw');
  var W=wrap.clientWidth, H=wrap.clientHeight;
  if(!W||!H){setTimeout(buildMap,60);return;}

  svgSel=d3.select('#ms').attr('width',W).attr('height',H).attr('viewBox','0 0 '+W+' '+H);
  svgSel.selectAll('*').remove();

  /* 投影 — 中心偏向欧亚，longitude 20 */
  proj=d3.geoNaturalEarth1()
    .scale(Math.min(W/5.8, H/3.0))
    .center([20,15])           /* 让欧亚大陆居中 */
    .translate([W/2, H/2]);

  var pathFn=d3.geoPath().projection(proj);

  /* 背景 */
  svgSel.append('rect').attr('width',W).attr('height',H).attr('fill','#0a0c14');

  var defs=svgSel.append('defs');

  /* 光点发光 filter */
  var dgf=defs.append('filter').attr('id','dg');
  dgf.append('feGaussianBlur').attr('stdDeviation','3.5').attr('result','b');
  var dm=dgf.append('feMerge');
  dm.append('feMergeNode').attr('in','b');
  dm.append('feMergeNode').attr('in','SourceGraphic');

  /* 热力渐变 — 位置用实际投影坐标，不用百分比 */
  var heatData=[
    {lng:15,  lat:48,  rx:80, ry:55, c:'rgba(148,95,12,0.5)'},   /* 欧洲 */
    {lng:105, lat:35,  rx:100,ry:65, c:'rgba(135,82,10,0.42)'},   /* 东亚 */
    {lng:114, lat:22,  rx:55, ry:40, c:'rgba(210,168,55,0.55)'},   /* 香港 active */
    {lng:-85, lat:40,  rx:60, ry:45, c:'rgba(125,75,8,0.35)'},    /* 北美 */
    {lng:-47, lat:-23, rx:40, ry:32, c:'rgba(115,68,6,0.28)'},    /* 南美 */
    {lng:30,  lat:30,  rx:55, ry:38, c:'rgba(120,72,8,0.28)'},    /* 中东非 */
  ];

  var heatG=svgSel.append('g').attr('id','gheat');
  heatData.forEach(function(h,i){
    var gid='hg'+i;
    var rg=defs.append('radialGradient').attr('id',gid).attr('cx','50%').attr('cy','50%').attr('r','50%');
    rg.append('stop').attr('offset','0%').attr('stop-color',h.c);
    rg.append('stop').attr('offset','100%').attr('stop-color','rgba(0,0,0,0)');
    var pt=proj([h.lng,h.lat]);
    heatG.append('ellipse')
      .attr('cx',pt[0]).attr('cy',pt[1])
      .attr('rx',h.rx).attr('ry',h.ry)
      .attr('fill','url(#'+gid+')');
  });

  /* 经纬线 — 极淡 */
  svgSel.append('line').attr('x1',0).attr('y1',H/2).attr('x2',W).attr('y2',H/2)
    .attr('stroke','rgba(255,255,255,0.008)').attr('stroke-width',0.3).attr('stroke-dasharray','6 16');

  /* 大陆图层 */
  var landG=svgSel.append('g').attr('id','gland').attr('opacity',0.95);

  /* 弧线图层 */
  svgSel.append('g').attr('id','garc');

  /* 光点图层 */
  svgSel.append('g').attr('id','gdot');

  /* 加载地图数据 */
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(function(r){return r.json();})
    .then(function(world){
      landG.selectAll('path')
        .data(topojson.feature(world,world.objects.countries).features)
        .join('path')
        .attr('d',pathFn)
        .attr('fill','rgba(255,255,255,0.12)')
        .attr('stroke','rgba(255,255,255,0.18)')
        .attr('stroke-width',0.5);
      landG.append('path')
        .datum(topojson.mesh(world,world.objects.countries,function(a,b){return a!==b;}))
        .attr('d',pathFn)
        .attr('fill','none')
        .attr('stroke','rgba(255,255,255,0.08)')
        .attr('stroke-width',0.3);
      drawDots();
      drawArcs();
    })
    .catch(function(){drawDots();drawArcs();});

  /* 缩放 */
  zoomBeh=d3.zoom().scaleExtent([0.8,8])
    .on('zoom',function(ev){
      d3.selectAll('#gland,#gheat,#garc,#gdot').attr('transform',ev.transform);
    });
  svgSel.call(zoomBeh);

  document.getElementById('zi').onclick=function(){svgSel.transition().duration(320).call(zoomBeh.scaleBy,1.5);};
  document.getElementById('zo').onclick=function(){svgSel.transition().duration(320).call(zoomBeh.scaleBy,0.67);};
}

function drawDots(){
  var g=d3.select('#gdot'); g.selectAll('*').remove();
  CITIES.forEach(function(city){
    var pt=proj([city.lng,city.lat]);
    var cx=pt[0],cy=pt[1];
    var isAct=active.cy===city.zh;
    if(isAct){
      var ring=g.append('circle').attr('cx',cx).attr('cy',cy).attr('r',17).attr('fill','rgba(201,168,76,0.08)');
      ring.append('animate').attr('attributeName','r').attr('values','10;22;10').attr('dur','2.4s').attr('repeatCount','indefinite');
      ring.append('animate').attr('attributeName','opacity').attr('values','0.6;0.1;0.6').attr('dur','2.4s').attr('repeatCount','indefinite');
      g.append('circle').attr('cx',cx).attr('cy',cy).attr('r',9).attr('fill','rgba(201,168,76,0.16)');
      g.append('circle').attr('cx',cx).attr('cy',cy).attr('r',5.5).attr('fill','#f0c86a').attr('filter','url(#dg)');
      g.append('text').attr('x',cx+11).attr('y',cy-4).attr('fill','rgba(237,232,223,0.82)').attr('font-size',11).attr('font-family','Georgia,serif').text(city.zh);
    } else {
      g.append('circle').attr('cx',cx).attr('cy',cy).attr('r',2.5).attr('fill','#c9a84c').attr('opacity',0.22).attr('cursor','pointer')
        .on('click',(function(c){return function(){var fp=PL.find(function(p){return p.cy===c.zh;});if(fp)pick(fp.id);};})(city));
    }
  });
}

function drawArcs(){
  var g=d3.select('#garc'); g.selectAll('*').remove();
  var ac=CITIES.find(function(c){return c.zh===active.cy;});
  if(!ac)return;
  var ap=proj([ac.lng,ac.lat]);
  var ops=[0.22,0.16,0.12,0.09,0.06];
  CITIES.filter(function(c){return c.zh!==ac.zh;}).forEach(function(c,i){
    var bp=proj([c.lng,c.lat]);
    var pts=[];
    for(var s=0;s<=50;s++){var t=s/50;pts.push([ap[0]+(bp[0]-ap[0])*t,ap[1]+(bp[1]-ap[1])*t+Math.sin(Math.PI*t)*-30]);}
    g.append('path').attr('d',d3.line()(pts)).attr('fill','none')
      .attr('stroke','rgba(201,168,76,'+(ops[i]||0.05)+')').attr('stroke-width',0.55).attr('stroke-dasharray','2 8');
  });
}

function showFcToast(msg,isErr){
  try{
    if(typeof window.shellToast==='function'){window.shellToast(msg);return;}
    if(window.parent&&window.parent!==window&&typeof window.parent.showToast==='function'){
      window.parent.showToast(msg);return;
    }
  }catch(e){}
  if(window.parent&&window.parent!==window){
    try{window.parent.postMessage({type:'toast',payload:{msg:msg}},'*');}catch(e2){}
  }
  var t=document.getElementById('map-toast');
  if(!t)return;
  t.textContent=msg;
  t.classList.toggle('err',!!isErr);
  t.classList.add('show');
  clearTimeout(showFcToast._t);
  showFcToast._t=setTimeout(function(){t.classList.remove('show','err');},2400);
}

function formatSbError(err){
  if(!err)return '打卡失败，请稍后重试';
  if(typeof err==='string')return err;
  if(err.message)return err.message;
  if(err.error_description)return err.error_description;
  if(err.details)return err.details;
  if(err.hint)return err.hint+' ('+(err.code||'')+')';
  return '打卡失败，请稍后重试';
}

function readUserFromStorage(){
  try{
    var k=Object.keys(localStorage).find(function(key){
      return key.indexOf('auth-token')>=0&&key.indexOf('supabase')>=0;
    });
    if(!k)return null;
    var raw=JSON.parse(localStorage.getItem(k));
    return raw&&raw.user?raw.user:null;
  }catch(e){return null;}
}

function ensureSbReady(){
  return new Promise(function(resolve,reject){
    if(window._sb)return resolve(window._sb);
    var done=false;
    var timer=setTimeout(function(){
      if(done)return;
      done=true;
      reject(new Error('地图服务未就绪，请刷新页面后重试'));
    },15000);
    window.addEventListener('supabase-ready',function(){
      if(done)return;
      done=true;
      clearTimeout(timer);
      if(window._sb)resolve(window._sb);
      else reject(new Error('Supabase 初始化失败'));
    },{once:true});
  });
}

function ensureMapUser(){
  return ensureSbReady().then(function(sb){
    if(window.currentUser)return window.currentUser;
    return sb.auth.getSession().then(function(res){
      var u=res.data&&res.data.session&&res.data.session.user;
      if(u){window.currentUser=u;return u;}
      u=readUserFromStorage();
      if(u)window.currentUser=u;
      return u;
    });
  });
}

function syncMapAuth(){
  return ensureMapUser().then(function(user){
    if(!user||!window._sb){
      window.currentProfile=null;
      return null;
    }
    return window._sb.from('profiles').select('role,username,display_name').eq('id',user.id).single()
      .then(function(res){
        window.currentProfile=res.data||null;
        return user;
      });
  }).catch(function(){return null;});
}

async function uploadCheckinImage(userId,placeId,file){
  var path=userId+'/'+placeId+'/'+Date.now()+'.jpg';
  var body=file;
  if(file.type!=='image/jpeg'){
    try{
      body=await fileToJpegBlob(file);
    }catch(e){body=file;}
  }
  var up=await window._sb.storage.from('place-checkins').upload(path,body,{
    contentType:'image/jpeg',
    upsert:false
  });
  if(up.error)throw up.error;
  var pub=window._sb.storage.from('place-checkins').getPublicUrl(path);
  return pub.data&&pub.data.publicUrl?pub.data.publicUrl:null;
}

function fileToJpegBlob(file){
  return new Promise(function(resolve,reject){
    var url=URL.createObjectURL(file);
    var img=new Image();
    img.onload=function(){
      var c=document.createElement('canvas');
      c.width=img.naturalWidth||img.width;
      c.height=img.naturalHeight||img.height;
      c.getContext('2d').drawImage(img,0,0);
      URL.revokeObjectURL(url);
      c.toBlob(function(b){b?resolve(b):reject(new Error('encode'));},'image/jpeg',0.88);
    };
    img.onerror=function(){URL.revokeObjectURL(url);reject(new Error('load'));};
    img.src=url;
  });
}

async function submitCheckin(){
  var btn=document.getElementById('fc-submit-checkin');
  var noteEl=document.getElementById('fc-note');
  var note=noteEl&&noteEl.value.trim();
  if(btn){btn.disabled=true;btn.textContent='提交中…';}
  var ok=false;
  try{
    var sb=await ensureSbReady();
    var user=await ensureMapUser();
    if(!user){
      if(typeof requireAuth==='function'){requireAuth('请先登录');}
      else navAuth();
      return;
    }
    if(userCheckedPlaces[active.id])return;
    var imageUrl=null;
    if(pendingCheckinFile){
      try{
        imageUrl=await uploadCheckinImage(user.id,active.id,pendingCheckinFile);
      }catch(upErr){
        console.warn('image upload',upErr);
        showFcToast('图片上传失败，已仅提交文字记录',true);
      }
    }
    var row={
      user_id:user.id,
      place_id:active.id,
      note:note||null,
      image_url:imageUrl
    };
    var ins=await sb.from('place_checkins').insert(row).select('id').single();
    if(ins.error)throw ins.error;
    if(!ins.data)throw new Error('打卡未写入，请确认已登录且数据表已创建');
    userCheckedPlaces[active.id]=true;
    closeCheckinPanel();
    clearCheckinForm();
    updateCheckinButton(true);
    showFcToast('已记录 · '+active.nm);
    ok=true;
  }catch(err){
    console.error('submitCheckin',err);
    showFcToast(formatSbError(err),true);
  }finally{
    if(btn&&!ok){
      btn.disabled=false;
      btn.textContent='提交打卡';
    }
  }
}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadPlaceRecords(){
  if(!window._sb){showFcToast('加载失败');return;}
  showRecordsView();
  var list=document.getElementById('fc-records-list');
  var title=document.getElementById('fc-records-title');
  if(title)title.textContent=active.nm+' · 全部记录';
  if(list)list.innerHTML='<div class="fc-rec-empty">加载中…</div>';
  var q=window._sb.from('place_checkins')
    .select('id,note,image_url,created_at,user_id,profiles(username,display_name)')
    .eq('place_id',active.id)
    .order('created_at',{ascending:false});
  var res=await q;
  if(res.error){
    res=await window._sb.from('place_checkins')
      .select('id,note,image_url,created_at,user_id')
      .eq('place_id',active.id)
      .order('created_at',{ascending:false});
  }
  if(!list)return;
  if(res.error||!res.data||!res.data.length){
    list.innerHTML='<div class="fc-rec-empty">暂无记录，成为第一个</div>';
    return;
  }
  list.innerHTML=res.data.map(function(r){
    var prof=r.profiles||{};
    var name=prof.display_name||prof.username||'影迷';
    var when=r.created_at?formatRecTime(r.created_at):'';
    var note=r.note?'<div class="fc-rec-note">'+escHtml(r.note)+'</div>':'';
    var img=r.image_url?'<img class="fc-rec-img" src="'+escHtml(r.image_url)+'" alt="" loading="lazy"/>':'';
    return '<div class="fc-rec-item">'+note+img
      +'<div class="fc-rec-meta">'+escHtml(name)+(when?' · '+when:'')+'</div></div>';
  }).join('');
}

function formatRecTime(iso){
  var d=new Date(iso);
  if(isNaN(d))return '';
  var y=d.getFullYear();
  var m=('0'+(d.getMonth()+1)).slice(-2);
  var day=('0'+d.getDate()).slice(-2);
  return y+'-'+m+'-'+day;
}

      if(active)refreshCheckinState(active.id);
    });
  });
}

function whenSbReady(fn){
  if(window._sb)fn();
  else window.addEventListener('supabase-ready',fn,{once:true});
}

/* ── 左侧列表 ── */
function filterCityList(){
  var seen={}, list=[];
  CITIES.forEach(function(c){ if(!seen[c.zh]){ seen[c.zh]=1; list.push(c.zh); } });
  PL.forEach(function(p){ if(!seen[p.cy]){ seen[p.cy]=1; list.push(p.cy); } });
  return list;
}

function buildCityTabs(){
  var el=document.getElementById('city-tabs');
  if(!el)return;
  var html='<span class="ct'+(activeCity===''?' active':'')+'" data-city="" onclick="filterCity(\'\')">全部</span>';
  filterCityList().forEach(function(cy){
    var esc=cy.replace(/'/g,'\\\'');
    html+='<span class="ct'+(activeCity===cy?' active':'')+'" data-city="'+cy+'" onclick="filterCity(\''+esc+'\')">'+cy+'</span>';
  });
  el.innerHTML=html;
}

function filterCity(city){
  activeCity=city;
  document.querySelectorAll('.ct').forEach(function(el){
    el.classList.toggle('active',(el.getAttribute('data-city')||'')===city);
  });
  refreshCityViews();
}

function doFilter(v){
  var list=document.getElementById('pl');
  var items=PL.filter(function(p){
    var matchSearch=p.nm.indexOf(v)>-1||p.cy.indexOf(v)>-1||(p.fm&&p.fm.indexOf(v)>-1);
    var matchCity=activeCity===''||p.cy===activeCity;
    return matchSearch&&matchCity;
  });
  list.innerHTML=items.map(function(p){
    var on=p.id===active.id?' on':'';
    var sub=p.tp==='fl'?'\u300a'+p.fm+'\u300b\u00b7 '+p.cy:p.cy;
    var tp=p.tp==='fl'?'电影地标':'影院现场';
    return '<div class="pi'+on+'" onclick="pick(\''+p.id+'\')"><div class="pi-t">'+tp+'</div><div class="pi-n">'+p.nm+'</div><div class="pi-s">'+sub+'</div></div>';
  }).join('');
}

/* ── 底部 strip ── */
function fillStrip(city){
  var isAll=!city;
  document.getElementById('bsn').textContent=isAll?'全部':city;
  var cp=placesByCity(city);
  document.getElementById('bsk').textContent=cp.length+' 个地点';
  renderRow('fr-fl',cp.filter(function(p){return p.tp==='fl';}));
  renderRow('fr-ci',cp.filter(function(p){return p.tp==='ci';}));
}

function renderRow(cid,places){
  var el=document.getElementById(cid);
  if(!places.length){
    el.innerHTML='<div style="font-size:9px;color:rgba(237,232,223,0.14);font-style:italic;padding:0 10px;align-self:center">暂无记录</div>';
    return;
  }
  el.innerHTML=places.map(function(p){
    var on=p.id===active.id?' on':'';
    var tp=p.tp==='fl'?'电影地标':'影院现场';
    var imgH=p.img
      ?'<img src="'+p.img+'" alt="'+p.nm+'" loading="lazy"/>'
      :'<div class="bf-ph"></div>';
    var filmInfo='';
    if(p.tp==='fl'&&p.fm){
      filmInfo='<div class="bf-fm">\u300a'+p.fm+'\u300b '+p.fy+' \u00b7 '+p.dr+'</div>';
    }
    return '<div class="bf'+on+'" data-id="'+p.id+'" role="button" tabindex="0">'
      +'<div class="bf-img">'+imgH+'<span class="bf-tp">'+tp+'</span></div>'
      +'<div class="bf-in"><div class="bf-nm">'+p.nm+'</div>'
      +filmInfo
      +'<div class="bf-qu">\u201c'+p.q+'\u201d</div></div>'
      +'</div>';
  }).join('');
}

function initStripClicks(){
  ['fr-fl','fr-ci'].forEach(function(id){
    var el=document.getElementById(id);
    if(!el||el._stripClick)return;
    el._stripClick=true;
    initDrag(el);
    el.addEventListener('click',function(e){
      if(el._dragMoved)return;
      var card=e.target.closest('.bf');
      if(!card)return;
      var pid=card.getAttribute('data-id');
      if(pid)pick(pid);
    });
    el.addEventListener('keydown',function(e){
      if(e.key!=='Enter'&&e.key!==' ')return;
      var card=e.target.closest('.bf');
      if(!card)return;
      e.preventDefault();
      var pid=card.getAttribute('data-id');
      if(pid)pick(pid);
    });
  });
}

function initDrag(el){
  var dn=false,sx=0,sl=0,startX=0;
  el._dragMoved=false;
  el.onmousedown=function(e){
    if(e.button!==0)return;
    dn=true;
    el._dragMoved=false;
    el.classList.add('gr');
    startX=e.pageX;
    sx=e.pageX-el.offsetLeft;
    sl=el.scrollLeft;
  };
  el.onmouseleave=function(){dn=false;el.classList.remove('gr');};
  el.onmouseup=function(){dn=false;el.classList.remove('gr');};
  el.onmousemove=function(e){
    if(!dn)return;
    if(Math.abs(e.pageX-startX)>4)el._dragMoved=true;
    e.preventDefault();
    el.scrollLeft=sl-(e.pageX-el.offsetLeft-sx)*1.2;
  };
}

/* ── 初始化 ── */
function bootMapPage(){
  buildCityTabs();
  initStripClicks();
  bindCheckinUi();
  refreshCityViews();
  fillCard(active);
  syncMapAuth().then(function(){
    if(active)refreshCheckinState(active.id);
  });
  setTimeout(function(){document.getElementById('fc').classList.add('vis');},500);
  setTimeout(buildMap,100);
}
Promise.all([
  fetch('data/place-images.json').then(function(r){return r.ok?r.json():{}}).catch(function(){return {};}),
  fetch('data/cinema-images.json').then(function(r){return r.ok?r.json():{}}).catch(function(){return {};})
]).then(function(dbs){
  applyPlaceImages(dbs[0]);
  applyCinemaImages(dbs[1]);
  return applySupabaseStorageCovers();
}).finally(function(){bootMapPage();});

window.pick=pick;
window.filterCity=filterCity;
window.doFilter=doFilter;

  var map={hk:'香港',berlin:'柏林',tokyo:'东京',paris:'巴黎',nyc:'纽约',sp:'圣保罗',beijing:'北京',shanghai:'上海'};
  var zh=map[String(slug||'').toLowerCase()];
  if(zh)filterCity(zh);
};

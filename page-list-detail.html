<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的片单 — Cine Ours</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#161616;color:#ede8df;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;}

/* 顶部导航 */
.top-nav{padding:12px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid rgba(237,232,223,0.06);position:sticky;top:0;background:#161616;z-index:10;}
.top-back{font-size:11px;color:rgba(201,168,76,0.5);cursor:pointer;}
.top-back:hover{color:rgba(201,168,76,0.8);}
.top-more{font-size:11px;padding:5px 12px;border:0.5px solid rgba(237,232,223,0.15);color:rgba(237,232,223,0.3);border-radius:2px;cursor:pointer;position:relative;}
.top-more:hover{border-color:rgba(237,232,223,0.25);color:rgba(237,232,223,0.5);}

/* 更多菜单 */
.more-menu{position:absolute;right:0;top:calc(100% + 6px);background:#1e1c16;border:0.5px solid rgba(237,232,223,0.1);border-radius:3px;min-width:160px;z-index:20;display:none;}
.more-menu.open{display:block;}
.more-item{padding:10px 16px;font-size:12px;color:rgba(237,232,223,0.6);cursor:pointer;white-space:nowrap;}
.more-item:hover{background:rgba(237,232,223,0.04);color:#ede8df;}
.more-item.danger{color:rgba(180,80,80,0.7);}
.more-item.danger:hover{color:#c87878;background:rgba(180,80,80,0.06);}
.more-sep{height:0.5px;background:rgba(237,232,223,0.06);margin:4px 0;}

/* Header */
.header{padding:26px 28px 22px;border-bottom:0.5px solid rgba(237,232,223,0.06);}
.header-inner{display:flex;gap:18px;align-items:flex-start;}

/* 封面叠加 */
.cover-wrap{flex-shrink:0;}
.cover-stack{position:relative;width:200px;height:108px;margin-bottom:10px;}
.cover-img{position:absolute;border-radius:2px;overflow:hidden;}
.cover-img img{width:100%;height:100%;object-fit:cover;}
.ci-3{left:46px;top:12px;width:148px;height:92px;filter:brightness(.38);}
.ci-2{left:23px;top:6px;width:148px;height:92px;filter:brightness(.62);}
.ci-1{left:0;top:0;width:148px;height:92px;border:0.5px solid rgba(237,232,223,0.12);}
.cover-add{font-size:10px;padding:5px 0;border:0.5px solid rgba(237,232,223,0.12);color:rgba(237,232,223,0.35);border-radius:2px;cursor:pointer;text-align:center;white-space:nowrap;width:148px;}
.cover-add:hover{border-color:rgba(201,168,76,0.3);color:rgba(201,168,76,0.6);}

/* 片单信息 */
.list-info{flex:1;min-width:0;}
.list-section-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:rgba(201,168,76,0.4);margin-bottom:5px;}
.list-title-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.list-title{font-family:Georgia,serif;font-size:20px;color:#ede8df;line-height:1.2;cursor:text;outline:none;background:transparent;border:none;width:100%;font-family:Georgia,serif;}
.list-title[contenteditable]:focus{border-bottom:0.5px solid rgba(201,168,76,0.3);}
.edit-icon{font-size:12px;color:rgba(237,232,223,0.2);cursor:pointer;flex-shrink:0;}
.edit-icon:hover{color:rgba(237,232,223,0.4);}
.list-meta{display:flex;align-items:center;gap:7px;font-size:10px;color:rgba(237,232,223,0.28);margin-bottom:8px;}
.meta-av{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:6px;}
.meta-pub{color:rgba(201,168,76,0.4);}
.list-desc{font-size:11px;color:rgba(237,232,223,0.22);font-style:italic;cursor:pointer;margin-bottom:10px;min-height:18px;}
.list-desc:hover{color:rgba(237,232,223,0.35);}
.list-desc-input{font-size:11px;color:rgba(237,232,223,0.55);font-style:italic;background:transparent;border:none;border-bottom:0.5px solid rgba(201,168,76,0.25);outline:none;width:100%;font-family:inherit;padding:2px 0;display:none;}

/* 进度条 + 分享 */
.progress-row{display:flex;align-items:center;gap:12px;}
.progress-wrap{flex:1;}
.progress-label{display:flex;justify-content:space-between;margin-bottom:4px;}
.progress-text{font-size:9px;color:rgba(237,232,223,0.25);}
.progress-pct{font-size:9px;color:#c9a84c;}
.progress-bar{height:2px;background:rgba(237,232,223,0.08);border-radius:1px;}
.progress-fill{height:100%;background:#c9a84c;border-radius:1px;transition:width .3s;}
.share-btn{font-size:10px;padding:5px 12px;border:1px solid #c9a84c;color:#c9a84c;border-radius:2px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.share-btn:hover{background:rgba(201,168,76,0.08);}

/* 关注者 */
.follower-col{flex-shrink:0;text-align:right;}
.follower-count{font-size:10px;color:rgba(237,232,223,0.25);margin-bottom:5px;}
.follower-avs{display:flex;gap:2px;justify-content:flex-end;margin-bottom:8px;}
.fav{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;}

/* Tabs */
.tabs{padding:0 28px;border-bottom:0.5px solid rgba(237,232,223,0.06);display:flex;align-items:center;justify-content:space-between;}
.tab-list{display:flex;}
.tab{padding:10px 14px 9px;font-size:11px;color:rgba(237,232,223,0.3);cursor:pointer;border-bottom:1.5px solid transparent;}
.tab.active{color:#c9a84c;border-bottom-color:#c9a84c;}
.tab-count{color:rgba(237,232,223,0.18);margin-left:3px;}
.tab.active .tab-count{color:rgba(201,168,76,0.4);}
.sort-btn{font-size:10px;color:rgba(237,232,223,0.25);cursor:pointer;}

/* 影片列表 */
.film-list{padding:0 28px;}
.film-row{display:flex;gap:12px;padding:13px 0;border-bottom:0.5px solid rgba(237,232,223,0.04);position:relative;}
.film-row:last-child{border:none;}
.status-icon{font-size:10px;width:16px;flex-shrink:0;padding-top:3px;text-align:center;}
.film-img{width:96px;height:58px;flex-shrink:0;border-radius:2px;overflow:hidden;background:#1a1408;}
.film-img img{width:100%;height:100%;object-fit:cover;display:block;}
.film-img-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:18px;color:rgba(201,168,76,0.18);}
.film-body{flex:1;min-width:0;}
.film-title-row{display:flex;align-items:baseline;gap:6px;margin-bottom:2px;}
.film-title{font-family:Georgia,serif;font-size:12px;color:rgba(237,232,223,0.88);}
.film-title-en{font-size:9px;color:rgba(237,232,223,0.28);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;}
.film-section{font-size:9px;color:rgba(237,232,223,0.28);margin-bottom:0;}
/* 已看状态 */
.watched-info{margin-top:5px;}
.watched-at{font-size:9px;color:rgba(237,232,223,0.3);margin-bottom:3px;}
.watched-quote{font-size:11px;color:rgba(237,232,223,0.58);font-family:Georgia,serif;font-style:italic;margin-bottom:4px;line-height:1.5;}
.watched-actions{display:flex;gap:10px;}
.wa-btn{font-size:9px;color:rgba(201,168,76,0.5);cursor:pointer;}
.wa-btn:hover{color:rgba(201,168,76,0.8);}
.wa-disc{font-size:9px;color:rgba(237,232,223,0.22);cursor:pointer;}
.add-note{font-size:10px;color:rgba(201,168,76,0.45);cursor:pointer;margin-top:5px;}
.add-note:hover{color:rgba(201,168,76,0.7);}
/* 未看操作 */
.unwatched-actions{opacity:0;transition:opacity .15s;display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0;margin-left:10px;}
.film-row:hover .unwatched-actions{opacity:1;}
.mark-btn{font-size:9px;padding:4px 10px;border:0.5px solid rgba(201,168,76,0.35);color:#c9a84c;border-radius:2px;cursor:pointer;white-space:nowrap;}
.mark-btn:hover{background:rgba(201,168,76,0.08);}
.remove-btn{font-size:9px;color:rgba(237,232,223,0.15);cursor:pointer;white-space:nowrap;}
.remove-btn:hover{color:rgba(237,232,223,0.35);}
/* 已看图片处理 */
.film-img.watched img{filter:brightness(.65) grayscale(.2);}

/* 标记已看弹窗 */
.modal-bg{position:fixed;inset:0;background:rgba(10,8,5,0.85);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:#1e1c16;border:0.5px solid rgba(237,232,223,0.1);border-radius:4px;width:400px;max-width:92vw;padding:24px;}
.modal-title{font-family:Georgia,serif;font-size:17px;color:#ede8df;margin-bottom:4px;}
.modal-film{font-size:11px;color:rgba(237,232,223,0.35);margin-bottom:18px;}
.modal-field{margin-bottom:13px;}
.modal-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(237,232,223,0.3);margin-bottom:6px;}
.modal-input{width:100%;background:#161614;border:0.5px solid rgba(237,232,223,0.12);color:#ede8df;font-size:13px;padding:8px 11px;border-radius:2px;font-family:inherit;outline:none;}
.modal-input:focus{border-color:rgba(201,168,76,0.4);}
.modal-input::placeholder{color:rgba(237,232,223,0.18);}
.modal-textarea{resize:vertical;min-height:68px;}
.modal-char{font-size:9px;color:rgba(237,232,223,0.2);text-align:right;margin-top:3px;}
.modal-suggest{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.msug{font-size:10px;padding:3px 9px;border:0.5px solid rgba(237,232,223,0.1);border-radius:2px;color:rgba(237,232,223,0.4);cursor:pointer;}
.msug:hover,.msug.sel{border-color:#c9a84c;color:#c9a84c;background:rgba(201,168,76,0.06);}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.modal-cancel{font-size:11px;color:rgba(237,232,223,0.3);cursor:pointer;padding:8px 14px;}
.modal-submit{background:#c9a84c;color:#161616;font-size:11px;font-weight:500;padding:8px 20px;border-radius:2px;cursor:pointer;border:none;font-family:inherit;}
.modal-submit:hover{opacity:.88;}
.modal-submit:disabled{opacity:.4;cursor:default;}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);padding:9px 20px;font-size:12px;border:0.5px solid rgba(237,232,223,0.1);background:#1e1c16;color:rgba(237,232,223,0.7);opacity:0;transition:all .25s;z-index:200;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(201,168,76,0.3);color:#c9a84c;}
.toast.err{border-color:rgba(180,80,80,0.3);color:#c87878;}

.empty{color:rgba(237,232,223,0.18);font-size:12px;padding:32px 0;text-align:center;}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="top-nav">
  <div class="top-back" onclick="navigate('page-offline-festival')">← 返回上海国际电影节 2026</div>
  <div class="top-more" id="more-btn" onclick="toggleMore()">
    更多 ⋯
    <div class="more-menu" id="more-menu">
      <div class="more-item" onclick="togglePublic()">设为私密 / 公开</div>
      <div class="more-sep"></div>
      <div class="more-item" onclick="shareList()">分享片单</div>
      <div class="more-sep"></div>
      <div class="more-item danger" onclick="deleteList()">删除片单</div>
    </div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-inner">

    <!-- 封面叠加 + 加片按钮 -->
    <div class="cover-wrap">
      <div class="cover-stack" id="cover-stack">
        <div class="cover-img ci-3"><img id="cover-img-3" src="" onerror="this.parentElement.style.background='#1a1408'"></div>
        <div class="cover-img ci-2"><img id="cover-img-2" src="" onerror="this.parentElement.style.background='#1a1408'"></div>
        <div class="cover-img ci-1"><img id="cover-img-1" src="" onerror="this.parentElement.style.background='#1a1408'"></div>
      </div>
      <div class="cover-add" onclick="openAddFilmModal()">从本届影展加片 +</div>
    </div>

    <!-- 片单信息 -->
    <div class="list-info">
      <div class="list-section-label">上海国际电影节 2026</div>
      <div class="list-title-row">
        <div class="list-title" id="list-title" contenteditable="false" spellcheck="false">我的本届片单</div>
        <span class="edit-icon" onclick="editTitle()">✏</span>
      </div>
      <div class="list-meta">
        <div class="meta-av" id="meta-av" style="background:rgba(201,168,76,0.2);color:#c9a84c;"></div>
        <span id="meta-username">@—</span>
        <span>·</span>
        <span id="meta-date">—</span>
        <span>·</span>
        <span class="meta-pub" id="meta-pub">● 公开</span>
      </div>
      <div class="list-desc" id="list-desc" onclick="editDesc()">说说你的选片思路…</div>
      <input class="list-desc-input" id="list-desc-input" placeholder="说说你的选片思路…" onblur="saveDesc()" maxlength="100">
      <div class="progress-row">
        <div class="progress-wrap">
          <div class="progress-label">
            <span class="progress-text" id="progress-text">已看 0 / 0 部</span>
            <span class="progress-pct" id="progress-pct">0%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        </div>
        <div class="share-btn" onclick="shareList()">分享片单 ↗</div>
      </div>
    </div>

    <!-- 关注者 -->
    <div class="follower-col">
      <div class="follower-count" id="follower-count">— 人关注</div>
      <div class="follower-avs" id="follower-avs"></div>
    </div>
  </div>
</div>

<!-- Tabs + 排序 -->
<div class="tabs">
  <div class="tab-list">
    <div class="tab active" id="tab-all"     onclick="switchTab('all')">全部 <span class="tab-count" id="cnt-all">0</span></div>
    <div class="tab"        id="tab-watched" onclick="switchTab('watched')">已看 <span class="tab-count" id="cnt-watched">0</span></div>
    <div class="tab"        id="tab-unwatched" onclick="switchTab('unwatched')">未看 <span class="tab-count" id="cnt-unwatched">0</span></div>
  </div>
  <div class="sort-btn">按加入时间 ▾</div>
</div>

<!-- 影片列表 -->
<div class="film-list" id="film-list">
  <div class="empty">加载中…</div>
</div>

<!-- 标记已看弹窗 -->
<div class="modal-bg" id="watched-modal">
  <div class="modal">
    <div class="modal-title">标记已看</div>
    <div class="modal-film" id="modal-film-name">—</div>
    <div class="modal-field">
      <div class="modal-label">影院（选填）</div>
      <input class="modal-input" id="w-venue" placeholder="在哪里看的？">
      <div class="modal-suggest">
        <span class="msug" onclick="selVenue(this)">大光明</span>
        <span class="msug" onclick="selVenue(this)">和平影都</span>
        <span class="msug" onclick="selVenue(this)">国泰电影院</span>
        <span class="msug" onclick="selVenue(this)">SFC上影影城</span>
        <span class="msug" onclick="selVenue(this)">天山电影院</span>
      </div>
    </div>
    <div class="modal-field">
      <div class="modal-label">散场感受（选填，最多 100 字）</div>
      <textarea class="modal-input modal-textarea" id="w-quote" placeholder="走出影院的那一刻…" maxlength="100" oninput="document.getElementById('w-char').textContent=this.value.length+' / 100'"></textarea>
      <div class="modal-char" id="w-char">0 / 100</div>
    </div>
    <div class="modal-foot">
      <span class="modal-cancel" onclick="closeModal()">取消</span>
      <button class="modal-submit" id="w-submit" onclick="submitWatched()">确认已看</button>
    </div>
  </div>
</div>

<!-- 加片弹窗（浏览影展片单） -->
<div class="modal-bg" id="add-film-modal">
  <div class="modal" style="width:480px;">
    <div class="modal-title">从本届影展加片</div>
    <div class="modal-field">
      <input class="modal-input" id="add-search" placeholder="搜索影片名…" oninput="searchAddFilms(this.value)" style="margin-bottom:8px;">
    </div>
    <div id="add-results" style="max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;"></div>
    <div class="modal-foot">
      <span class="modal-cancel" onclick="document.getElementById('add-film-modal').classList.remove('open')">关闭</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB   = 'https://dirrnojiybbwotuqeqww.supabase.co';
const KEY  = 'sb_publishable_Rbie_WEsyNAV38b-QKrbCw_bBwuxicP';
const FEST = 'siff2026';
const BGS  = ['linear-gradient(135deg,#1c1408,#120e04)','linear-gradient(135deg,#0e1018,#0a0c12)','linear-gradient(135deg,#0c1810,#080e0a)','linear-gradient(135deg,#181006,#120c04)','linear-gradient(135deg,#100818,#0c0614)'];

let _user = null;
let _token = null; // 用户 access_token，用于写入操作
let _listId = null;
let _listData = null;
let _films = [];
let _siffFilms = [];
let _curTab = 'all';
let _markingFilm = null;

// ── Supabase ──────────────────────────────
async function sb(path, opts = {}) {
  const isWrite = opts.method && opts.method !== 'GET';
  const authToken = (isWrite && _token) ? _token : KEY;
  const r = await fetch(SB + path, {
    ...opts,
    headers: {
      'apikey': KEY, 'Authorization': 'Bearer ' + authToken,
      'Content-Type': 'application/json',
      ...(opts.prefer ? {'Prefer': opts.prefer} : {}),
      ...(opts.headers || {})
    }
  });
  if (r.status === 204) return null;
  const d = await r.json().catch(() => null);
  if (!r.ok) throw new Error((d && d.message) || r.statusText);
  return d;
}

// ── Auth ──────────────────────────────────
function initUser() {
  try {
    const k = Object.keys(localStorage).find(k => k.includes('auth-token') && k.includes('supabase'));
    if (k) {
      const p = JSON.parse(localStorage.getItem(k));
      _user  = p?.user || null;
      _token = p?.access_token || null;
    }
  } catch(e) { _user = null; _token = null; }
}

function requireLogin(cb) {
  if (!_user) {
    localStorage.setItem('cine_redirect', 'list-detail');
    toast('请先登录', 'err');
    setTimeout(() => navigate('page-auth'), 800);
    return;
  }
  cb();
}

// ── navigate ──────────────────────────────
function navigate(page) {
  try {
    if (window.parent && window.parent !== window) window.parent.postMessage({type:'navigate', page}, '*');
    else window.location.href = page + '.html';
  } catch(e) {}
}

// ── toast ─────────────────────────────────
let _tt;
function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(_tt); _tt = setTimeout(() => t.className = 'toast', 2800);
}

// ── 更多菜单 ──────────────────────────────
function toggleMore() {
  document.getElementById('more-menu').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!document.getElementById('more-btn').contains(e.target)) {
    document.getElementById('more-menu').classList.remove('open');
  }
});

// ── modal ─────────────────────────────────
function closeModal() {
  document.getElementById('watched-modal').classList.remove('open');
  _markingFilm = null;
}
document.querySelectorAll('.modal-bg').forEach(el =>
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
);

// ── 标题编辑 ──────────────────────────────
function editTitle() {
  const el = document.getElementById('list-title');
  el.contentEditable = 'true';
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  el.onblur = async () => {
    el.contentEditable = 'false';
    const newTitle = el.textContent.trim() || '我的本届片单';
    el.textContent = newTitle;
    if (_listId && _user) {
      try {
        await sb(`/rest/v1/user_lists?id=eq.${_listId}`, {
          method: 'PATCH', prefer: 'return=minimal',
          body: JSON.stringify({title: newTitle})
        });
      } catch(e) {}
    }
  };
}

// ── 描述编辑 ──────────────────────────────
function editDesc() {
  const desc = document.getElementById('list-desc');
  const input = document.getElementById('list-desc-input');
  input.value = desc.textContent === '说说你的选片思路…' ? '' : desc.textContent;
  desc.style.display = 'none';
  input.style.display = 'block';
  input.focus();
}
async function saveDesc() {
  const desc = document.getElementById('list-desc');
  const input = document.getElementById('list-desc-input');
  const val = input.value.trim();
  desc.textContent = val || '说说你的选片思路…';
  desc.style.display = '';
  input.style.display = 'none';
  if (_listId && _user && val) {
    try {
      await sb(`/rest/v1/user_lists?id=eq.${_listId}`, {
        method: 'PATCH', prefer: 'return=minimal',
        body: JSON.stringify({description: val})
      });
    } catch(e) {}
  }
}

// ── 影院快选 ──────────────────────────────
function selVenue(el) {
  document.getElementById('w-venue').value = el.textContent;
  document.querySelectorAll('.msug').forEach(i => i.classList.remove('sel'));
  el.classList.add('sel');
}

// ── 颜色工具 ──────────────────────────────
function avColor(str) {
  const sets = [['rgba(201,168,76,.25)','#c9a84c'],['rgba(100,140,200,.25)','rgba(120,160,220,.9)'],['rgba(160,80,120,.25)','rgba(180,100,140,.9)'],['rgba(80,140,100,.25)','rgba(100,180,120,.9)']];
  let h = 0; for (const c of (str||'?')) h = (h*31+c.charCodeAt(0))&0xffff;
  return sets[h % sets.length];
}
function ago(d) {
  if (!d) return '';
  const s = (Date.now()-new Date(d))/1000;
  return s<60?'刚刚':s<3600?Math.floor(s/60)+' 分钟前':s<86400?Math.floor(s/3600)+' 小时前':Math.floor(s/86400)+' 天前';
}
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${dt.getMonth()+1}月${dt.getDate()}日`;
}

// ── 加载片单数据 ──────────────────────────
async function loadList() {
  // 从 URL 参数或 localStorage 获取 listId
  const params = new URLSearchParams(window.location.search);
  _listId = params.get('id') || localStorage.getItem('cine_list_id');
  if (!_listId && _user) {
    // 查找用户当前影展的片单，没有则创建
    await ensureList();
  }
  if (!_listId) {
    document.getElementById('film-list').innerHTML = '<div class="empty">片单不存在，请从上影节页面进入</div>';
    return;
  }
  try {
    const data = await sb(`/rest/v1/user_lists?id=eq.${_listId}&select=*,user:profiles(username,display_name,avatar_url),films:user_list_films(*)`);
    // 如果没有返回数据且有 listId，可能是 RLS 拦截，清掉缓存
    if (!data?.length) {
      localStorage.removeItem('cine_list_id');
      document.getElementById('film-list').innerHTML = '<div class="empty">片单读取失败，请返回上影节页面重新进入</div>';
      return;
    }
    _listData = data[0];
    _films = _listData.films || [];
    renderHeader();
    renderFilms();
  } catch(e) {
    document.getElementById('film-list').innerHTML = `<div class="empty">加载失败</div>`;
  }
}

// ── 确保片单存在 ──────────────────────────
async function ensureList() {
  try {
    const existing = await sb(`/rest/v1/user_lists?user_id=eq.${_user.id}&festival=eq.${FEST}&select=id&limit=1`);
    if (existing?.length) {
      _listId = existing[0].id;
    } else {
      const created = await sb('/rest/v1/user_lists', {
        method: 'POST', prefer: 'return=representation',
        body: JSON.stringify({user_id: _user.id, title: '我的本届片单', festival: FEST, is_public: true})
      });
      _listId = created?.[0]?.id;
    }
    if (_listId) localStorage.setItem('cine_list_id', _listId);
  } catch(e) {}
}

// ── 渲染 Header ───────────────────────────
function renderHeader() {
  if (!_listData) return;
  const list = _listData;
  const uname = list.user?.display_name || list.user?.username || '影迷';
  const [bg, fg] = avColor(uname);

  // 标题
  document.getElementById('list-title').textContent = list.title || '我的本届片单';
  // 描述
  const descEl = document.getElementById('list-desc');
  descEl.textContent = list.description || '说说你的选片思路…';
  if (!list.description) descEl.style.color = 'rgba(237,232,223,0.2)';
  // meta
  const av = document.getElementById('meta-av');
  av.textContent = uname[0]; av.style.background = bg; av.style.color = fg;
  document.getElementById('meta-username').textContent = '@' + (list.user?.username || '影迷');
  document.getElementById('meta-date').textContent = list.created_at ? new Date(list.created_at).toLocaleDateString('zh-CN', {month:'numeric',day:'numeric'}) + ' 创建' : '';
  document.getElementById('meta-pub').textContent = list.is_public ? '● 公开' : '● 私密';
  // 关注
  document.getElementById('follower-count').textContent = (list.follower_count || 0) + ' 人关注';
  // 进度
  updateProgress();
  // 封面（取前3张有图的影片）
  const withImg = _films.filter(f => f.poster_path).slice(0, 3);
  const imgs = [
    document.getElementById('cover-img-1'),
    document.getElementById('cover-img-2'),
    document.getElementById('cover-img-3'),
  ];
  withImg.forEach((f, i) => { if (imgs[i]) imgs[i].src = f.poster_path; });
}

// ── 更新进度 ──────────────────────────────
function updateProgress() {
  const total   = _films.length;
  const watched = _films.filter(f => f.status === 'watched').length;
  const pct     = total ? Math.round(watched / total * 100) : 0;
  document.getElementById('progress-text').textContent = `已看 ${watched} / ${total} 部`;
  document.getElementById('progress-pct').textContent  = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('cnt-all').textContent       = total;
  document.getElementById('cnt-watched').textContent   = watched;
  document.getElementById('cnt-unwatched').textContent = total - watched;
}

// ── Tab 切换 ──────────────────────────────
function switchTab(tab) {
  _curTab = tab;
  ['all','watched','unwatched'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t === tab);
  });
  renderFilms();
}

// ── 渲染影片列表 ──────────────────────────
function renderFilms() {
  const listEl = document.getElementById('film-list');
  let films = _films;
  if (_curTab === 'watched')   films = films.filter(f => f.status === 'watched');
  if (_curTab === 'unwatched') films = films.filter(f => f.status !== 'watched');
  if (!films.length) {
    listEl.innerHTML = `<div class="empty">${_curTab === 'watched' ? '还没有已看的影片' : _curTab === 'unwatched' ? '所有影片都看完了！' : '片单是空的，去加片吧'}</div>`;
    return;
  }
  listEl.innerHTML = films.map((f, i) => {
    const isWatched = f.status === 'watched';
    const imgHtml = f.poster_path
      ? `<img src="${f.poster_path}" alt="${f.title}" onerror="this.style.display='none'">`
      : `<div class="film-img-fb" style="background:${BGS[i%5]};">${f.title[0]}</div>`;
    const statusIcon = isWatched
      ? `<span style="color:rgba(201,168,76,0.6);">✓</span>`
      : `<span style="color:rgba(237,232,223,0.12);">○</span>`;
    let extraHtml = '';
    if (isWatched) {
      const hasMoment = !!(f.watched_venue || f.watched_quote);
      if (hasMoment) {
        extraHtml = `<div class="watched-info">
          ${f.watched_venue || f.watched_at ? `<div class="watched-at">已看于：${fmtDate(f.watched_at)}${f.watched_venue ? ' · ' + f.watched_venue : ''}</div>` : ''}
          ${f.watched_quote ? `<div class="watched-quote">「${f.watched_quote}」</div>` : ''}
          <div class="watched-actions">
            <span class="wa-btn" onclick="openWatchedEdit('${f.id}','${f.title.replace(/'/g,"\\'")}')">记录更多 ▾</span>
            <span class="wa-disc">讨论</span>
          </div>
        </div>`;
      } else {
        extraHtml = `<div class="watched-info">
          ${f.watched_at ? `<div class="watched-at">已看于：${fmtDate(f.watched_at)}${f.watched_venue ? ' · ' + f.watched_venue : ''}</div>` : ''}
          <span class="add-note" onclick="openWatchedEdit('${f.id}','${f.title.replace(/'/g,"\\'")}')">+ 补一句散场感受</span>
        </div>`;
      }
    } else {
      extraHtml = `<div class="unwatched-actions">
        <div class="mark-btn" onclick="openMarkWatched('${f.id}','${f.title.replace(/'/g,"\\'")}')">标记已看</div>
        <div class="remove-btn" onclick="removeFilm('${f.id}')">移出片单</div>
      </div>`;
    }
    return `<div class="film-row">
      <div class="status-icon">${statusIcon}</div>
      <div class="film-img${isWatched ? ' watched' : ''}" style="${!f.poster_path ? 'background:'+BGS[i%5]+';' : ''}">${imgHtml}</div>
      <div class="film-body">
        <div class="film-title-row">
          <span class="film-title" style="${isWatched ? 'color:rgba(237,232,223,0.6);' : ''}">${f.title}</span>
          ${f.title_en ? `<span class="film-title-en">${f.title_en}</span>` : ''}
        </div>
        <div class="film-section" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          ${f.year ? `<span style="color:rgba(237,232,223,0.28);font-size:9px;">${f.year}</span>` : ''}
          ${f.year && (f.note || f.director) ? `<span style="color:rgba(237,232,223,0.1);font-size:9px;">·</span>` : ''}
          ${f.director ? `<span style="color:rgba(237,232,223,0.28);font-size:9px;">导演：${f.director}</span>` : ''}
          ${(f.year || f.director) && f.note ? `<span style="color:rgba(237,232,223,0.1);font-size:9px;">·</span>` : ''}
          ${f.note ? `<span style="color:rgba(201,168,76,0.45);font-size:9px;letter-spacing:.06em;">${f.note}</span>` : ''}
        </div>
        ${extraHtml}
      </div>
    </div>`;
  }).join('');
}

// ── 标记已看 ──────────────────────────────
function openMarkWatched(filmId, filmTitle) {
  _markingFilm = {id: filmId, title: filmTitle, mode: 'new'};
  document.getElementById('modal-film-name').textContent = filmTitle;
  document.getElementById('w-venue').value = '';
  document.getElementById('w-quote').value = '';
  document.getElementById('w-char').textContent = '0 / 100';
  document.querySelectorAll('.msug').forEach(i => i.classList.remove('sel'));
  document.getElementById('watched-modal').classList.add('open');
}
function openWatchedEdit(filmId, filmTitle) {
  _markingFilm = {id: filmId, title: filmTitle, mode: 'edit'};
  document.getElementById('modal-film-name').textContent = filmTitle;
  const f = _films.find(x => x.id === filmId);
  document.getElementById('w-venue').value = f?.watched_venue || '';
  document.getElementById('w-quote').value = f?.watched_quote || '';
  document.getElementById('w-char').textContent = (f?.watched_quote?.length || 0) + ' / 100';
  document.getElementById('watched-modal').classList.add('open');
}
async function submitWatched() {
  if (!_markingFilm) return;
  const venue = document.getElementById('w-venue').value.trim();
  const quote = document.getElementById('w-quote').value.trim();
  const btn   = document.getElementById('w-submit');
  btn.disabled = true; btn.textContent = '保存中…';
  try {
    const patch = {status: 'watched', watched_at: new Date().toISOString()};
    if (venue) patch.watched_venue = venue;
    if (quote) patch.watched_quote = quote;
    await sb(`/rest/v1/user_list_films?id=eq.${_markingFilm.id}`, {
      method: 'PATCH', prefer: 'return=minimal', body: JSON.stringify(patch)
    });
    // 同步写入 moments 表
    if (quote && _user) {
      const f = _films.find(x => x.id === _markingFilm.id);
      await sb('/rest/v1/moments', {
        method: 'POST', prefer: 'return=minimal',
        body: JSON.stringify({user_id: _user.id, festival: FEST, film_title: _markingFilm.title, venue: venue||null, content: quote})
      }).catch(() => {});
    }
    // 更新本地数据
    const idx = _films.findIndex(x => x.id === _markingFilm.id);
    if (idx >= 0) {
      _films[idx].status = 'watched';
      _films[idx].watched_at = new Date().toISOString();
      if (venue) _films[idx].watched_venue = venue;
      if (quote) _films[idx].watched_quote = quote;
    }
    closeModal();
    toast('已记录 ✓', 'ok');
    updateProgress();
    renderFilms();
  } catch(e) { toast('保存失败：'+e.message, 'err'); }
  finally { btn.disabled=false; btn.textContent='确认已看'; }
}

// ── 移出片单 ──────────────────────────────
async function removeFilm(filmId) {
  try {
    await sb(`/rest/v1/user_list_films?id=eq.${filmId}`, {method:'DELETE'});
    _films = _films.filter(f => f.id !== filmId);
    updateProgress();
    renderFilms();
    toast('已移出片单', '');
  } catch(e) { toast('操作失败', 'err'); }
}

// ── 加片（搜索上影节片单）────────────────
async function openAddFilmModal() {
  if (!_siffFilms.length) {
    try {
      const data = await sb(`/rest/v1/siff_films?festival=eq.${FEST}&select=*&order=order_index`);
      _siffFilms = data || [];
    } catch(e) {}
  }
  document.getElementById('add-search').value = '';
  renderAddResults(_siffFilms.slice(0, 12));
  document.getElementById('add-film-modal').classList.add('open');
}
function searchAddFilms(val) {
  const hits = val.trim()
    ? _siffFilms.filter(f => f.title.includes(val) || (f.title_en||'').toLowerCase().includes(val.toLowerCase()))
    : _siffFilms.slice(0, 12);
  renderAddResults(hits);
}
function renderAddResults(films) {
  const el = document.getElementById('add-results');
  const inList = new Set(_films.map(f => f.tmdb_id).filter(Boolean));
  el.innerHTML = films.map(f => {
    const already = inList.has(f.tmdb_id);
    return `<div style="display:flex;gap:10px;align-items:center;padding:8px;border-radius:2px;background:#1a1810;border:0.5px solid rgba(237,232,223,0.05);">
      <div style="width:60px;height:36px;flex-shrink:0;border-radius:2px;overflow:hidden;background:#1a1408;">
        ${f.siff_img ? `<img src="${f.siff_img}" style="width:100%;height:100%;object-fit:cover;filter:brightness(.85);">` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(201,168,76,.2);">${f.title[0]}</div>`}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-family:Georgia,serif;font-size:12px;color:rgba(237,232,223,${already?'.3':'.88'});">${f.title}</div>
        <div style="font-size:9px;color:rgba(237,232,223,.28);">${f.section||''} ${f.year?'· '+f.year:''}</div>
      </div>
      ${already
        ? `<span style="font-size:9px;color:rgba(201,168,76,.4);">已加入</span>`
        : `<span style="font-size:10px;padding:3px 10px;border:0.5px solid rgba(201,168,76,.3);color:#c9a84c;border-radius:2px;cursor:pointer;" onclick="addFilm(${f.tmdb_id||'null'},'${f.title.replace(/'/g,"\\'")}','${f.title_en||''}','${f.year||''}','${f.siff_img||''}','${f.section||''}')">加入</span>`
      }
    </div>`;
  }).join('');
}
async function addFilm(tmdbId, title, titleEn, year, siffImg, section) {
  if (!_listId) return;
  try {
    const data = await sb('/rest/v1/user_list_films', {
      method: 'POST', prefer: 'return=representation',
      body: JSON.stringify({list_id: _listId, tmdb_id: tmdbId||null, title, title_en: titleEn||null, year: year?parseInt(year):null, poster_path: siffImg||null, note: section||null})
    });
    if (data?.[0]) _films.push(data[0]);
    updateProgress();
    renderFilms();
    // 刷新加片弹窗
    searchAddFilms(document.getElementById('add-search').value);
    toast(`《${title}》已加入片单 ✓`, 'ok');
  } catch(e) {
    if ((e.message||'').includes('23505')) toast('已在片单中', '');
    else toast('加入失败', 'err');
  }
}

// ── 公开/私密切换 ─────────────────────────
async function togglePublic() {
  if (!_listId || !_listData) return;
  const newVal = !_listData.is_public;
  try {
    await sb(`/rest/v1/user_lists?id=eq.${_listId}`, {
      method: 'PATCH', prefer: 'return=minimal', body: JSON.stringify({is_public: newVal})
    });
    _listData.is_public = newVal;
    document.getElementById('meta-pub').textContent = newVal ? '● 公开' : '● 私密';
    toast(newVal ? '片单已公开' : '片单已设为私密', 'ok');
  } catch(e) { toast('操作失败', 'err'); }
  document.getElementById('more-menu').classList.remove('open');
}

// ── 删除片单 ──────────────────────────────
async function deleteList() {
  if (!_listId) return;
  if (!confirm('确认删除这个片单？此操作不可撤销。')) return;
  try {
    await sb(`/rest/v1/user_lists?id=eq.${_listId}`, {method:'DELETE'});
    localStorage.removeItem('cine_list_id');
    toast('片单已删除', '');
    setTimeout(() => navigate('page-offline-festival'), 1200);
  } catch(e) { toast('删除失败', 'err'); }
}

// ── 分享片单 ──────────────────────────────
function shareList() {
  if (!_listId) return;
  // 公开片单
  if (_listData && !_listData.is_public) {
    sb(`/rest/v1/user_lists?id=eq.${_listId}`, {
      method: 'PATCH', prefer: 'return=minimal', body: JSON.stringify({is_public: true})
    }).then(() => { if (_listData) _listData.is_public = true; document.getElementById('meta-pub').textContent = '● 公开'; }).catch(()=>{});
  }
  // 复制链接
  const url = `${location.origin}/page-list-detail.html?id=${_listId}`;
  navigator.clipboard.writeText(url).then(() => toast('链接已复制 ✓', 'ok')).catch(() => toast('片单已公开，请手动复制链接', 'ok'));
  document.getElementById('more-menu').classList.remove('open');
}

// ── 初始化 ────────────────────────────────
async function init() {
  initUser();
  // 如果没有 token，等待 100ms 让 authSync 有机会到达
  if (!_token) await new Promise(r => setTimeout(r, 120));
  await loadList();
}
// 监听来自 index.html 的登录状态同步
window.addEventListener('message', e => {
  if (e.data?.type === 'authSync' && e.data.user) {
    _user  = e.data.user;
    _token = e.data.token || _token;
  }
});

document.addEventListener('DOMContentLoaded', init);
</script>

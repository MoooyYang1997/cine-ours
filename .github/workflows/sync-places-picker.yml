name: Sync places-picker.json

on:
  push:
    paths:
      - 'data/places.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate places-picker.json
        run: node scripts/sync-places-picker.cjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/places-picker.json
          if git diff --staged --quiet; then
            echo "places-picker.json 无变化"
            exit 0
          fi
          git commit -m "chore: 同步 places-picker.json（来自 places.js）"
          git push
